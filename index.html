        <div><label style={S.label}>Polski</label><input style={S.input()} value={p.pl} onChange={e=>setP(x=>({...x,pl:e.target.value}))}/></div>

        <div>
          <label style={S.label}>Typ</label>
          <select value={p.type||"expression"} onChange={e=>setP(x=>({...x,type:e.target.value}))} style={{...S.input(),cursor:"pointer"}}>

          <button style={S.btn("ghost")} onClick={onClose}>Anuluj</button>

        </div>

    </Modal>

}

function AddPhraseModal({ onAdd, onClose }) {
  const [p, setP] = useState({ en:"", pl:"", example:"", example_pl:"", type:"phrasal_verb", category:"Zwroty" });
  function save() {
    if (!p.en.trim() || !p.pl.trim()) return;
    onAdd({ ...p, en: p.en.trim(), pl: p.pl.trim() });
    onClose();
  }
  return (
    <Modal title="Dodaj zwrot" onClose={onClose}>
      <div style={S.col(12)}>
        <div>
          <label style={S.label}>Typ</label>
          <select value={p.type} onChange={e=>setP(x=>({...x,type:e.target.value}))} style={{...S.input(),cursor:"pointer"}}>
            {Object.entries(PHRASE_TYPES).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
          </select>
        </div>
        <div><label style={S.label}>Angielski</label><input style={S.input()} value={p.en} onChange={e=>setP(x=>({...x,en:e.target.value}))} placeholder="break up" autoFocus/></div>
        <div><label style={S.label}>Polski</label><input style={S.input()} value={p.pl} onChange={e=>setP(x=>({...x,pl:e.target.value}))} placeholder="rozstać się"/></div>
        <div><label style={S.label}>Przykład EN (opcjonalnie)</label><input style={S.input()} value={p.example} onChange={e=>setP(x=>({...x,example:e.target.value}))} placeholder="They broke up after two years."/></div>
        <div><label style={S.label}>Przykład PL (opcjonalnie)</label><input style={S.input()} value={p.example_pl} onChange={e=>setP(x=>({...x,example_pl:e.target.value}))} placeholder="Rozstali się po dwóch latach."/></div>
        <button style={{...S.btn("primary"),width:"100%"}} onClick={save}>Dodaj zwrot</button>
      </div>
    </Modal>
  );
}

// ════════════════════════════════════════════════════════════
//  LIBRARY TAB
// ════════════════════════════════════════════════════════════
function LibraryTab({ ctx }) {
  const { data, currentUser, getProgress } = ctx;
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [showImport, setShowImport] = useState(false);
  const [selectedIds, setSelectedIds] = useState([]);
  const [showScopeModal, setShowScopeModal] = useState(false);
  const [expandSynonym, setExpandSynonym] = useState(null);

  function getWordStatus(w) {
    if (w.status === "pending") return { label: "Oczekuje", color: T.acc };
    const p = getProgress(w.id);
    if (p.score < 0) return { label: "Trudne", color: T.red };
    if (p.score === 0 && !p.lastSeen) return { label: "Nowe", color: T.tx3 };
    if (p.score >= 4) return { label: "Znam", color: T.green };
    return { label: "Uczę się", color: T.acc2 };
  }

  const canEdit = isAdmin(currentUser) || isTeacher(currentUser);

  const filtered = data.words.filter(w => {
    const q = search.toLowerCase();
    const mq = !q || w.en.toLowerCase().includes(q) || w.pl.toLowerCase().includes(q) || (w.category || "").toLowerCase().includes(q);
    const mc = filterCat === "all" || w.category === filterCat;
    const st = getWordStatus(w).label;
    const ms = filterStatus === "all" || st === filterStatus;
    return mq && mc && ms;
  });

  function toggleSelect(id) {
    setSelectedIds(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);
  }

  function selectAll() { setSelectedIds(filtered.map(w => w.id)); }
  function clearSelect() { setSelectedIds([]); }

  return (
    <div style={S.col(12)}>
      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, letterSpacing: -0.5 }}>Baza słów</div>

      {/* Toolbar */}
      <div style={S.col(8)}>
        <input style={S.input()} value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Szukaj…" />
        <div style={S.row()}>
          <select value={filterCat} onChange={e => setFilterCat(e.target.value)} style={{ ...S.input(), width: "auto", cursor: "pointer", flex: 1 }}>
            <option value="all">Wszystkie kategorie</option>
            {data.categories.map(c => <option key={c} value={c}>{c} ({data.words.filter(w => w.category === c).length})</option>)}
          </select>
          <select value={filterStatus} onChange={e => setFilterStatus(e.target.value)} style={{ ...S.input(), width: "auto", cursor: "pointer", flex: 1 }}>
            {["all", "Nowe", "Oczekuje", "Uczę się", "Znam", "Trudne"].map(s => <option key={s} value={s}>{s === "all" ? "Wszystkie" : s}</option>)}
          </select>
        </div>
      </div>

      {/* Actions bar */}
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={{ fontSize: 13, color: T.tx3 }}>{filtered.length} / {data.words.length} słów</div>
        <div style={S.row({ gap: 6 })}>
          {canEdit && <button style={S.btn("ghost", true)} onClick={() => setShowAdd(true)}>+ Dodaj</button>}
          {canEdit && <button style={S.btn("ghost", true)} onClick={() => setShowImport(true)}>⬆ Import</button>}
        </div>
      </div>

      {/* Selection bar */}
      {selectedIds.length > 0 && (
        <div style={S.card2({ background: `${T.acc}10`, border: `1px solid ${T.acc}`, display: "flex", justifyContent: "space-between", alignItems: "center" })}>
          <div style={{ fontSize: 13, color: T.acc }}>Zaznaczono: {selectedIds.length}</div>
          <div style={S.row({ gap: 6 })}>
            <button style={S.btn("primary", true)} onClick={() => setShowScopeModal(true)}>Utwórz zakres testu</button>
            <button style={S.btn("ghost", true)} onClick={clearSelect}>Odznacz</button>
          </div>
        </div>
      )}

      {/* Word list */}
      <div style={S.col(4)}>
        {/* Header row */}
        <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "0 4px" }}>
          <input type="checkbox" checked={selectedIds.length === filtered.length && filtered.length > 0} onChange={e => e.target.checked ? selectAll() : clearSelect()} style={{ width: 16, height: 16, accentColor: T.acc }} />
          <div style={{ fontSize: 10, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1px" }}>Zaznacz wszystkie</div>
        </div>

        {filtered.map(w => {
          const st = getWordStatus(w);
          const sel = selectedIds.includes(w.id);
          return (
            <div key={w.id} style={{ background: sel ? `${T.acc}08` : T.s1, border: `1px solid ${sel ? T.acc : T.b1}`, borderRadius: T.r, padding: "12px 14px", display: "flex", gap: 10, alignItems: "flex-start", transition: "all .1s" }}>
              <input type="checkbox" checked={sel} onChange={() => toggleSelect(w.id)} style={{ width: 16, height: 16, marginTop: 2, accentColor: T.acc, flexShrink: 0 }} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                  <div>
                    <span style={{ fontFamily: "'DM Mono',monospace", fontWeight: 500, fontSize: 14 }}>{w.en}</span>
                    {w.forms && <span style={{ fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", marginLeft: 6 }}>({w.forms.past})</span>}
                  </div>
                  <span style={S.badge(st.color, { flexShrink: 0 })}>{st.label}</span>
                </div>
                <div style={{ fontSize: 13, color: T.tx2, marginTop: 2 }}>{w.pl}</div>
                {w.category && <div style={{ ...S.badge(T.acc2, { marginTop: 5 }), fontSize: 10 }}>{w.category}</div>}
              </div>
              {canEdit && (
                <div style={S.col(4, { flexShrink: 0 })}>
                  <button onClick={() => setEditing({ ...w })} style={{ background: "none", border: "none", color: T.tx3, cursor: "pointer", fontSize: 14 }}>✏️</button>
                  <button onClick={() => { if (confirm("Usunąć?")) ctx.deleteWord(w.id); }} style={{ background: "none", border: "none", color: T.tx3, cursor: "pointer", fontSize: 14 }}>🗑</button>
                  {w.status === "pending" && <button onClick={() => ctx.updateWord(w.id, { status: "approved" })} style={{ background: "none", border: "none", color: T.green, cursor: "pointer", fontSize: 14 }}>✓</button>}
                  <button onClick={() => setExpandSynonym(expandSynonym === w.id ? null : w.id)} style={{ background: "none", border: "none", color: T.acc2, cursor: "pointer", fontSize: 14 }} title="Synonimy">🔍</button>
                </div>
              )}
            </div>
          );
        })}
        {/* Inline synonym panel */}
        {expandSynonym && (() => {
          const w = filtered.find(x => x.id === expandSynonym);
          return w ? <div key={"syn_"+w.id}><SynonymPanel word={w} ctx={ctx} autoOpen={true} /></div> : null;
        })()}
        {filtered.length === 0 && <div style={{ textAlign: "center", color: T.tx3, padding: 32, fontSize: 13 }}>Brak słów pasujących do filtrów</div>}
      </div>

      {/* Modals */}
      {editing && <EditWordModal word={editing} categories={data.categories} onSave={changes => { ctx.updateWord(editing.id, changes); setEditing(null); ctx.showToast("Zapisano"); }} onClose={() => setEditing(null)} />}
      {showAdd && <AddWordModal categories={data.categories} onAdd={words => { ctx.addWords(words); setShowAdd(false); }} onClose={() => setShowAdd(false)} />}
      {showImport && <ImportModal categories={data.categories} onAdd={words => { ctx.addWords(words); setShowImport(false); }} onClose={() => setShowImport(false)} />}
      {showScopeModal && <CreateScopeModal selectedIds={selectedIds} onSave={scope => { ctx.addTestScope(scope); setShowScopeModal(false); setSelectedIds([]); ctx.showToast("Zakres testu utworzony"); }} onClose={() => setShowScopeModal(false)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  MANAGE TAB (Admin + Teacher)
// ════════════════════════════════════════════════════════════
function ManageTab({ ctx }) {
  const { data, currentUser, exportData, importData } = ctx;
  const [subTab, setSubTab] = useState("scopes");
  const fileRef = useRef();

  const pending = data.words.filter(w => w.status === "pending");

  const subTabs = [
    { id: "scopes", label: "Sprawdziany" },
    { id: "pending", label: `Moderacja ${pending.length > 0 ? `(${pending.length})` : ""}` },
    ...(isAdmin(currentUser) ? [{ id: "users", label: "Użytkownicy" }, { id: "api", label: "🔑 API" }, { id: "data", label: "Dane" }] : []),
  ];

  return (
    <div style={S.col(14)}>
      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, letterSpacing: -0.5 }}>Zarządzanie</div>

      {/* Sub-tabs */}
      <div style={S.row({ gap: 6, flexWrap: "wrap" })}>
        {subTabs.map(t => (
          <button key={t.id} onClick={() => setSubTab(t.id)} style={S.btn(subTab === t.id ? "primary" : "ghost", true)}>{t.label}</button>
        ))}
      </div>

      {subTab === "scopes" && <ScopesManager ctx={ctx} />}
      {subTab === "pending" && <PendingModeration ctx={ctx} />}
      {subTab === "users" && isAdmin(currentUser) && <UsersManager ctx={ctx} />}
      {subTab === "api" && isAdmin(currentUser) && <ApiSettings ctx={ctx} />}
      {subTab === "data" && isAdmin(currentUser) && (
        <div style={S.col(12)}>
          <div style={{ fontSize: 13, color: T.tx2 }}>Eksportuj lub importuj całą bazę danych. Użyj do backupu lub synchronizacji między urządzeniami.</div>
          <button style={S.btn("primary")} onClick={exportData}>⬇ Eksportuj backup JSON</button>
          <button style={S.btn("ghost")} onClick={() => fileRef.current.click()}>⬆ Importuj backup JSON</button>
          <input ref={fileRef} type="file" accept=".json" style={{ display: "none" }} onChange={e => { const f = e.target.files[0]; if (!f) return; const r = new FileReader(); r.onload = ev => importData(ev.target.result); r.readAsText(f); }} />
          <div style={{ fontSize: 11, color: T.tx3, lineHeight: 1.7 }}>
            Baza: <strong style={{ color: T.tx }}>{data.words.length}</strong> słów · <strong style={{ color: T.tx }}>{data.categories.length}</strong> kategorii · <strong style={{ color: T.tx }}>{data.sessions.length}</strong> sesji
          </div>
        </div>
      )}
    </div>
  );
}

//  API SETTINGS
// ════════════════════════════════════════════════════════════
function ApiSettings({ ctx }) {
  const userId = ctx?.currentUser?.id;
  const [key, setKey] = useState(() => getGeminiKey(userId));
  const [show, setShow] = useState(false);
  const [status, setStatus] = useState(null);
  const [errorMsg, setErrorMsg] = useState("");

  async function verify() {
    if (!key.trim()) return;
    setStatus("checking");
    setErrorMsg("");
    const result = await verifyGeminiKey(key.trim());
    if (result.ok) {
      setGeminiKey(key.trim(), userId);
      setStatus("ok");
    } else {
      setStatus("error");
      setErrorMsg(result.error);
    }
  }

  function save() {
    setGeminiKey(key.trim(), userId);
    setStatus(null);
  }

  function clear() {
    setKey("");
    setGeminiKey("", userId);
    setStatus(null);
  }

  const savedKey = getGeminiKey(userId);

  return (
    <div style={S.col(14)}>
      {/* Status banner */}
      <div style={S.card2({
        background: savedKey ? `${T.green}10` : `${T.acc}10`,
        border: `1px solid ${savedKey ? T.green : T.acc}`,
      })}>
        <div style={S.row({ gap: 10 })}>
          <span style={{ fontSize: 22 }}>{savedKey ? "✅" : "⚠️"}</span>
          <div>
            <div style={{ fontWeight: 600, fontSize: 14, color: savedKey ? T.green : T.acc }}>
              {savedKey ? "Gemini AI aktywny" : "Brak klucza API"}
            </div>
            <div style={{ fontSize: 12, color: T.tx2, marginTop: 2 }}>
              {savedKey
                ? "Odpowiedzi oceniane przez AI — tolerancja form, synonimów i literówek."
                : "Bez klucza działa tryb lokalny — dopasowanie tekstowe z tolerancją literówek."}
            </div>
          </div>
        </div>
      </div>

      {/* How to get key */}
      <div style={S.card()}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 8 }}>Jak uzyskać klucz Gemini Flash?</div>
        <div style={{ fontSize: 12, color: T.tx2, lineHeight: 1.9 }}>
          1. Wejdź na <span style={{ color: T.acc, fontFamily: "'DM Mono',monospace" }}>aistudio.google.com</span><br/>
          2. Kliknij <strong>"Get API key"</strong> → <strong>"Create API key"</strong><br/>
          3. Skopiuj klucz (zaczyna się od <span style={{ fontFamily: "'DM Mono',monospace", color: T.acc2 }}>AIzaSy…</span>)<br/>
          4. Wklej poniżej i kliknij <strong>"Zweryfikuj i zapisz"</strong>
        </div>
        <div style={{ marginTop: 10, padding: "8px 12px", background: T.s3, borderRadius: 8, fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", lineHeight: 1.7 }}>
          Darmowy limit: 1500 req/dzień · 15 req/min<br/>
          Klucz przechowywany lokalnie w przeglądarce.<br/>
          Nigdzie nie wysyłany poza zapytaniami do Google.
        </div>
      </div>

      {/* Key input */}
      <div>
        <label style={S.label}>Klucz API Gemini</label>
        <div style={S.row({ gap: 8 })}>
          <input
            style={{ ...S.input(), flex: 1, fontFamily: "'DM Mono',monospace", letterSpacing: show ? 0 : 2 }}
            type={show ? "text" : "password"}
            value={key}
            onChange={e => { setKey(e.target.value); setStatus(null); }}
            placeholder="AIzaSy…"
            autoComplete="off"
            spellCheck={false}
          />
          <button style={S.btn("ghost", true)} onClick={() => setShow(s => !s)}>
            {show ? "🙈" : "👁"}
          </button>
        </div>
      </div>

      {/* Verify status */}
      {status === "checking" && (
        <div style={S.row({ gap: 8, color: T.tx3, fontSize: 13 })}>
          <div style={{ width: 14, height: 14, border: `2px solid ${T.b2}`, borderTopColor: T.acc2, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
          Weryfikuję klucz…
        </div>
      )}
      {status === "ok" && (
        <div style={{ fontSize: 13, color: T.green }}>✓ Klucz poprawny — zapisano!</div>
      )}
      {status === "error" && (
        <div style={S.col(4)}>
          <div style={{ fontSize: 13, color: T.red }}>✗ Błąd: {errorMsg}</div>
          <div style={{ fontSize: 11, color: T.tx3 }}>Sprawdź czy klucz jest poprawny i czy masz dostęp do Gemini API.</div>
        </div>
      )}

      {/* Action buttons */}
      <div style={S.row({ gap: 8 })}>
        <button style={S.btn("primary")} onClick={verify} disabled={!key.trim() || status === "checking"}>
          {status === "checking" ? "Sprawdzam…" : "✓ Zweryfikuj i zapisz"}
        </button>
        {savedKey && (
          <button style={S.btn("danger")} onClick={clear}>Usuń klucz</button>
        )}
      </div>

      {/* How evaluation works */}
      <div style={S.card()}>
        <div style={{ fontSize: 13, fontWeight: 600, marginBottom: 10 }}>Jak działa ocena odpowiedzi?</div>
        <div style={S.col(8)}>
          {[
            { icon: "⚡", label: "Tryb lokalny (zawsze)", desc: "Dopasowanie tekstu, tolerancja diakrytyków i 1-2 literówek, rozpoznawanie form czasownika. Działa offline.", color: T.acc2 },
            { icon: "🤖", label: "Tryb AI (z kluczem)", desc: "Gemini ocenia semantycznie — widzę = widzieć ✓, synonimy, różne formy gramatyczne, feedback po polsku.", color: T.purple },
            { icon: "≈", label: "Ocena częściowa", desc: "Odpowiedź akceptowana ale nieprecyzyjna — 70% XP. Słowo wraca do powtórki.", color: T.acc },
          ].map(x => (
            <div key={x.label} style={S.row({ gap: 10, alignItems: "flex-start" })}>
              <span style={{ fontSize: 20, width: 28, textAlign: "center", flexShrink: 0 }}>{x.icon}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: x.color }}>{x.label}</div>
                <div style={{ fontSize: 12, color: T.tx2, marginTop: 2 }}>{x.desc}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScopesManager({ ctx }) {
  const { data } = ctx;
  const [showCreate, setShowCreate] = useState(false);

  return (
    <div style={S.col(10)}>
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={{ fontSize: 13, color: T.tx3 }}>{data.testScopes.length} zakresów</div>
        <button style={S.btn("primary", true)} onClick={() => setShowCreate(true)}>+ Nowy zakres</button>
      </div>

      {data.testScopes.length === 0 && <div style={{ color: T.tx3, fontSize: 13, textAlign: "center", padding: 24 }}>Brak zakresów. Utwórz zakres testu z listy słów lub tutaj.</div>}

      {data.testScopes.map(s => (
        <div key={s.id} style={S.card()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{s.name}</div>
              <div style={{ fontSize: 12, color: T.tx3, marginTop: 3 }}>{s.wordIds.length} słów{s.dueDate ? ` · sprawdzian: ${new Date(s.dueDate).toLocaleDateString("pl")}` : ""}</div>
            </div>
            <span style={S.badge(s.status === "active" ? T.green : s.status === "done" ? T.tx3 : T.acc)}>{s.status === "active" ? "Aktywny" : s.status === "done" ? "Zakończony" : "Szkic"}</span>
          </div>
          <div style={{ ...S.row({ gap: 6, marginTop: 12 }) }}>
            <button style={S.btn("ghost", true)} onClick={() => ctx.updateTestScope(s.id, { status: s.status === "active" ? "draft" : "active" })}>
              {s.status === "active" ? "Dezaktywuj" : "Aktywuj"}
            </button>
            <button style={S.btn("danger", true)} onClick={() => { if (confirm("Usunąć?")) ctx.deleteTestScope(s.id); }}>Usuń</button>
          </div>
        </div>
      ))}

      {showCreate && <CreateScopeModal selectedIds={[]} allWords={data.words} categories={data.categories} onSave={scope => { ctx.addTestScope(scope); setShowCreate(false); ctx.showToast("Zakres utworzony"); }} onClose={() => setShowCreate(false)} />}
    </div>
  );
}

function PendingModeration({ ctx }) {
  const pending = ctx.data.words.filter(w => w.status === "pending");
  if (!pending.length) return <div style={{ color: T.tx3, fontSize: 13, textAlign: "center", padding: 24 }}>✓ Wszystkie słowa zatwierdzone</div>;

  return (
    <div style={S.col(8)}>
      <div style={{ fontSize: 13, color: T.tx2 }}>{pending.length} słów czeka na zatwierdzenie</div>
      {pending.map(w => (
        <div key={w.id} style={S.card()}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontWeight: 500 }}>{w.en} <span style={{ color: T.tx3 }}>→</span> {w.pl}</div>
              {w.forms && <div style={{ fontSize: 12, color: T.tx3, fontFamily: "'DM Mono',monospace", marginTop: 2 }}>{w.forms.past} · {w.forms.pp}</div>}
              <div style={{ ...S.badge(T.acc2, { marginTop: 6 }), fontSize: 10 }}>{w.category}</div>
            </div>
            <div style={S.row({ gap: 6 })}>
              <button style={S.btn("success", true)} onClick={() => ctx.updateWord(w.id, { status: "approved" })}>✓ Zatwierdź</button>
              <button style={S.btn("danger", true)} onClick={() => ctx.deleteWord(w.id)}>✕ Odrzuć</button>
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

function UsersManager({ ctx }) {
  const { data, currentUser } = ctx;
  const [showAdd, setShowAdd] = useState(false);

  return (
    <div style={S.col(10)}>
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={{ fontSize: 13, color: T.tx3 }}>{data.users.length} użytkowników</div>
        <button style={S.btn("primary", true)} onClick={() => setShowAdd(true)}>+ Dodaj użytkownika</button>
      </div>

      {data.users.map(u => (
        <div key={u.id} style={S.card({ border: `1px solid ${u.id === currentUser.id ? T.acc : T.b1}` })}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
            <div>
              <div style={{ fontWeight: 600, fontSize: 15 }}>{u.name} {u.id === currentUser.id && <span style={{ fontSize: 11, color: T.acc }}>(Ty)</span>}</div>
              <div style={S.row({ gap: 4, marginTop: 5 })}>
                {u.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color, { fontSize: 10 })}>{ROLE_META[r].icon} {ROLE_META[r].label}</span>)}
              </div>
              <div style={{ fontSize: 11, color: T.tx3, marginTop: 5, fontFamily: "'DM Mono',monospace" }}>XP: {u.xp || 0} · Seria: {u.streak || 0} dni</div>
            </div>
            {u.id !== currentUser.id && (
              <button style={S.btn("danger", true)} onClick={() => { if (confirm(`Usunąć ${u.name}?`)) ctx.deleteUser(u.id); }}>Usuń</button>
            )}
          </div>
        </div>
      ))}

      {showAdd && <AddUserModal onAdd={profile => { ctx.addUser(profile); setShowAdd(false); }} onClose={() => setShowAdd(false)} />}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
function Modal({ title, onClose, children }) {
  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.75)", zIndex: 500, display: "flex", alignItems: "flex-end", justifyContent: "center" }} onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: T.s1, border: `1px solid ${T.b2}`, borderRadius: `${T.r3} ${T.r3} 0 0`, padding: "24px 20px 32px", width: "100%", maxWidth: 480, maxHeight: "90vh", overflowY: "auto", animation: "fadeUp .25s ease" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20 }}>{title}</div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: T.tx2, cursor: "pointer", fontSize: 20, lineHeight: 1 }}>✕</button>
        </div>
        {children}
      </div>
    </div>
  );
}

function EditWordModal({ word, categories, onSave, onClose }) {
  const [w, setW] = useState({ ...word });
  const hasForms = !!w.forms;
  return (
    <Modal title="Edytuj słowo" onClose={onClose}>
      <div style={S.col(12)}>
        <div><label style={S.label}>Angielski</label><input style={S.input()} value={w.en} onChange={e => setW(x => ({ ...x, en: e.target.value }))} /></div>
        <div><label style={S.label}>Polski</label><input style={S.input()} value={w.pl} onChange={e => setW(x => ({ ...x, pl: e.target.value }))} /></div>
        <div>
          <label style={S.label}>Kategoria</label>
          <select value={w.category || ""} onChange={e => setW(x => ({ ...x, category: e.target.value }))} style={{ ...S.input(), cursor: "pointer" }}>
            {categories.map(c => <option key={c} value={c}>{c}</option>)}
          </select>
        </div>
        <div style={S.row()}>
          <label style={{ ...S.label, marginBottom: 0 }}>Formy czasownika</label>
          <input type="checkbox" checked={hasForms} onChange={e => setW(x => ({ ...x, forms: e.target.checked ? { past: "", pp: "" } : null }))} style={{ accentColor: T.acc }} />
        </div>
        {hasForms && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={S.label}>Past</label><input style={S.input()} value={w.forms.past} onChange={e => setW(x => ({ ...x, forms: { ...x.forms, past: e.target.value } }))} /></div>
            <div><label style={S.label}>Past Participle</label><input style={S.input()} value={w.forms.pp} onChange={e => setW(x => ({ ...x, forms: { ...x.forms, pp: e.target.value } }))} /></div>
          </div>
        )}
        <div><label style={S.label}>Status</label>
          <select value={w.status} onChange={e => setW(x => ({ ...x, status: e.target.value }))} style={{ ...S.input(), cursor: "pointer" }}>
            {["pending", "approved", "flagged"].map(s => <option key={s} value={s}>{s}</option>)}
          </select>
        </div>
        <div style={S.row({ justifyContent: "flex-end" })}>
          <button style={S.btn("ghost")} onClick={onClose}>Anuluj</button>
          <button style={S.btn("primary")} onClick={() => onSave(w)}>Zapisz</button>
        </div>
      </div>
    </Modal>
  );
}

function AddWordModal({ categories, onAdd, onClose }) {
  const [form, setForm] = useState({ en: "", pl: "", category: categories[0] || "", hasForms: false, past: "", pp: "", newCat: "" });
  function save() {
    if (!form.en.trim() || !form.pl.trim()) return;
    const cat = form.newCat.trim() || form.category;
    onAdd([{ en: form.en.trim().toLowerCase(), pl: form.pl.trim(), category: cat, forms: form.hasForms && form.past && form.pp ? { past: form.past, pp: form.pp } : null, language: "en-pl", status: "approved", source: "manual" }]);
    onClose();
  }
  return (
    <Modal title="Dodaj słowo" onClose={onClose}>
      <div style={S.col(12)}>
        <div><label style={S.label}>Angielski</label><input style={S.input()} value={form.en} onChange={e => setForm(f => ({ ...f, en: e.target.value }))} autoFocus /></div>
        <div><label style={S.label}>Polski</label><input style={S.input()} value={form.pl} onChange={e => setForm(f => ({ ...f, pl: e.target.value }))} /></div>
        <div>
          <label style={S.label}>Kategoria</label>
          <select value={form.category} onChange={e => setForm(f => ({ ...f, category: e.target.value }))} style={{ ...S.input(), cursor: "pointer" }}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div><label style={S.label}>Lub nowa kategoria</label><input style={S.input()} value={form.newCat} onChange={e => setForm(f => ({ ...f, newCat: e.target.value }))} placeholder="Wpisz nową…" /></div>
        <div style={S.row()}>
          <label style={{ ...S.label, marginBottom: 0 }}>Czasownik (dodaj formy)</label>
          <input type="checkbox" checked={form.hasForms} onChange={e => setForm(f => ({ ...f, hasForms: e.target.checked }))} style={{ accentColor: T.acc }} />
        </div>
        {form.hasForms && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
            <div><label style={S.label}>Past</label><input style={S.input()} value={form.past} onChange={e => setForm(f => ({ ...f, past: e.target.value }))} /></div>
            <div><label style={S.label}>Past Participle</label><input style={S.input()} value={form.pp} onChange={e => setForm(f => ({ ...f, pp: e.target.value }))} /></div>
          </div>
        )}
        <button style={{ ...S.btn("primary"), width: "100%" }} onClick={save}>Dodaj słowo</button>
      </div>
    </Modal>
  );
}

function ImportModal({ categories, onAdd, onClose }) {
  const [csvText, setCsvText] = useState("");
  const [catName, setCatName] = useState(categories[0] || "");
  const [newCat, setNewCat] = useState("");
  function doImport() {
    const cat = newCat.trim() || catName;
    const lines = csvText.split("\n").map(l => l.trim()).filter(l => l && !l.startsWith("#"));
    const words = [];
    lines.forEach(line => {
      const p = line.split(",").map(s => s.trim().replace(/^"|"$/g, ""));
      if (p.length < 2) return;
      const [en, pl, past, pp] = p;
      if (!en || !pl) return;
      words.push({ en: en.toLowerCase(), pl, category: cat, forms: past && pp ? { past, pp } : null, language: "en-pl", status: "approved", source: "import" });
    });
    onAdd(words);
    onClose();
  }
  return (
    <Modal title="Import CSV" onClose={onClose}>
      <div style={S.col(12)}>
        <div style={{ fontSize: 12, color: T.tx3, lineHeight: 1.8, fontFamily: "'DM Mono',monospace" }}>
          Format: <strong style={{ color: T.tx }}>angielski,polski,past,pp</strong><br />
          Przykład: <strong style={{ color: T.acc }}>go,iść,went,gone</strong><br />
          Zwykłe słowo: <strong style={{ color: T.acc }}>beautiful,piękny</strong>
        </div>
        <div>
          <label style={S.label}>Kategoria</label>
          <select value={catName} onChange={e => setCatName(e.target.value)} style={{ ...S.input(), cursor: "pointer" }}>
            {categories.map(c => <option key={c}>{c}</option>)}
          </select>
        </div>
        <div><label style={S.label}>Lub nowa kategoria</label><input style={S.input()} value={newCat} onChange={e => setNewCat(e.target.value)} placeholder="Wpisz…" /></div>
        <textarea style={{ ...S.input(), minHeight: 160, resize: "vertical" }} value={csvText} onChange={e => setCsvText(e.target.value)} placeholder={"go,iść,went,gone\nbeautiful,piękny\nrun,biegać,ran,run"} />
        <button style={{ ...S.btn("primary"), width: "100%" }} onClick={doImport}>Importuj</button>
      </div>
    </Modal>
  );
}

function CreateScopeModal({ selectedIds, allWords, onSave, onClose }) {
  const [name, setName] = useState("");
  const [dueDate, setDueDate] = useState("");
  return (
    <Modal title="Utwórz zakres testu" onClose={onClose}>
      <div style={S.col(12)}>
        <div><label style={S.label}>Nazwa zakresu</label><input style={S.input()} value={name} onChange={e => setName(e.target.value)} placeholder="Np. Sprawdzian — rozdział 4" autoFocus /></div>
        <div><label style={S.label}>Data sprawdzianu (opcjonalnie)</label><input style={S.input()} type="date" value={dueDate} onChange={e => setDueDate(e.target.value)} /></div>
        <div style={{ fontSize: 13, color: T.tx2 }}>Zaznaczonych słów: <strong style={{ color: T.acc }}>{selectedIds.length}</strong></div>
        <button style={{ ...S.btn("primary"), width: "100%" }} onClick={() => { if (!name.trim()) return; onSave({ name: name.trim(), wordIds: selectedIds, dueDate: dueDate || null, status: "active" }); }} disabled={!name.trim()}>
          Utwórz zakres
        </button>
      </div>
    </Modal>
  );
}

function AddUserModal({ onAdd, onClose }) {
  const [form, setForm] = useState({ name: "", pin: "", mode: "student" });
  const MODES = [
    { key: "student", roles: ["student"], label: "Uczeń" },
    { key: "teacher", roles: ["teacher"], label: "Nauczyciel" },
    { key: "admin", roles: ["admin", "teacher", "student"], label: "Administrator" },
  ];
  function save() {
    if (!form.name.trim() || form.pin.length < 4) return;
    const roles = MODES.find(m => m.key === form.mode)?.roles || ["student"];
    onAdd({ name: form.name.trim(), pin: form.pin, roles });
    onClose();
  }
  return (
    <Modal title="Dodaj użytkownika" onClose={onClose}>
      <div style={S.col(12)}>
        <div><label style={S.label}>Imię / Nick</label><input style={S.input()} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} autoFocus /></div>
        <div><label style={S.label}>PIN (min. 4 cyfry)</label><input style={S.input()} type="password" inputMode="numeric" maxLength={8} value={form.pin} onChange={e => setForm(f => ({ ...f, pin: e.target.value.replace(/\D/g, "") }))} /></div>
        <div>
          <label style={S.label}>Rola</label>
          <div style={S.col(6)}>
            {MODES.map(m => (
              <button key={m.key} onClick={() => setForm(f => ({ ...f, mode: m.key }))}
                style={{ background: form.mode === m.key ? `${T.acc}15` : T.s2, border: `1.5px solid ${form.mode === m.key ? T.acc : T.b1}`, borderRadius: T.r, padding: "10px 14px", cursor: "pointer", textAlign: "left", display: "flex", justifyContent: "space-between" }}>
                <span style={{ color: form.mode === m.key ? T.acc : T.tx, fontSize: 14 }}>{m.label}</span>
                <div style={S.row({ gap: 4 })}>{m.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color, { fontSize: 10 })}>{ROLE_META[r].label}</span>)}</div>
              </button>
            ))}
          </div>
        </div>
        <button style={{ ...S.btn("primary"), width: "100%" }} onClick={save}>Dodaj użytkownika</button>
      </div>
    </Modal>
  );
}
