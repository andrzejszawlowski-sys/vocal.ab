const uid = () => Math.random().toString(36).slice(2, 10);
const norm = s => (s || "").trim().toLowerCase().replace(/[''`]/g, "'").replace(/ą/g,"a").replace(/ć/g,"c").replace(/ę/g,"e").replace(/ł/g,"l").replace(/ń/g,"n").replace(/ó/g,"o").replace(/ś/g,"s").replace(/ź/g,"z").replace(/ż/g,"z");
const normPL = s => (s || "").trim().toLowerCase().replace(/[''`]/g, "'");

// Levenshtein distance
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({ length: m + 1 }, (_, i) => [i, ...Array(n).fill(0)]);
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j], dp[i][j-1], dp[i-1][j-1]);
  return dp[m][n];
}

// Polish verb form normalization — strips common suffixes to root
function plRoot(s) {
  const w = normPL(s);
  // Strip personal endings to get infinitive-like root
  return w
    .replace(/(uję|ujesz|uje|ujemy|ujecie|ują)$/, "ować")
    .replace(/(ię|isz|i|imy|icie|ią)$/, "ić")
    .replace(/(ę|esz|e|emy|ecie|ą)$/, "ać")
    .replace(/(am|asz|a|amy|acie|ają)$/, "ać")
    .replace(/(ę|ysz|y|ymy|ycie|ą)$/, "yć")
    .replace(/em$/, "eć")
    .replace(/ę$/, "eć");
}

// Exact or fuzzy match — returns "full"|"typo"|"none"
function localMatch(inp, correct) {
  const i = normPL(inp.trim()); if (!i) return "none";
  const alts = correct.split("/").map(a => normPL(a.trim()));
  // 1. exact
  if (alts.some(a => a === i)) return "full";
  // 2. diacritic-stripped exact
  if (alts.some(a => norm(a) === norm(i))) return "full";
  // 3. verb form — compare roots
  if (alts.some(a => plRoot(a) === plRoot(i))) return "partial";
  // 4. Levenshtein ≤ 2 (typo tolerance)
  const minDist = Math.min(...alts.map(a => levenshtein(norm(a), norm(i))));
  if (minDist === 1) return "typo";
  if (minDist === 2 && i.length > 5) return "typo";
  return "none";
}

const matchAny = (inp, correct) => localMatch(inp, correct) !== "none";

const shuffle = arr => { const a = [...arr]; for (let i = a.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [a[i], a[j]] = [a[j], a[i]]; } return a; };

// ════════════════════════════════════════════════════════════
//  AI EVALUATOR  (Gemini Flash 2.0)
// ════════════════════════════════════════════════════════════
// Per-user key stored as vl_gemini_key__userId, falls back to shared
function getGeminiKey(userId) {
  try {
    if (userId) {
      const personal = localStorage.getItem(`${GEMINI_KEY_STORAGE}__${userId}`);
      if (personal) return personal;
    }
    return localStorage.getItem(GEMINI_KEY_STORAGE) || "";
  } catch { return ""; }
}
function setGeminiKey(key, userId) {
  try {
    const k = (key || "").trim();
    const storKey = userId ? `${GEMINI_KEY_STORAGE}__${userId}` : GEMINI_KEY_STORAGE;
    if (k) localStorage.setItem(storKey, k);
    else localStorage.removeItem(storKey);
  } catch {}
}

// Returns { quality: "full"|"partial"|"wrong", feedback: string, suggestion: string, source: "ai"|"local" }
async function evaluateAnswer({ wordEN, wordPL, userAnswer, forms, formsAnswer, userId }) {
  const key = getGeminiKey(userId);

  // ── LEVEL 1: local check first (instant, no API) ──────
  const localResult = localMatch(userAnswer, wordPL);
  let formsOk = true;
  let formsDetail = "";

  if (forms && formsAnswer) {
    const pastResult = localMatch(formsAnswer.past || "", forms.past);
    const ppResult   = localMatch(formsAnswer.pp   || "", forms.pp);
    formsOk = pastResult !== "none" && ppResult !== "none";
    if (!formsOk) {
      formsDetail = `Past: ${formsAnswer.past || "—"} (poprawnie: ${forms.past}) · PP: ${formsAnswer.pp || "—"} (poprawnie: ${forms.pp})`;
    }
  }

  // Perfect local match — no need for AI
  if (localResult === "full" && formsOk) {
    return { quality: "full", feedback: "Idealna odpowiedź!", suggestion: wordPL, source: "local" };
  }

  // Typo in main word but forms OK
  if (localResult === "typo" && formsOk) {
    return { quality: "partial", feedback: `Literówka — prawie dobrze!`, suggestion: wordPL, source: "local" };
  }

  // Partial (verb form match) — may still be OK, confirm with AI if key available
  if (localResult === "partial" && formsOk && !key) {
    return { quality: "partial", feedback: `Akceptowana forma. Wzorcowe tłumaczenie: ${wordPL}`, suggestion: wordPL, source: "local" };
  }

  // Clear mismatch without AI key — just show proper answer
  if (!key) {
    if (localResult === "none") {
      return { quality: "wrong", feedback: `Błędna odpowiedź.`, suggestion: wordPL, source: "local",
        correctDisplay: wordPL + (forms ? ` · ${forms.past} · ${forms.pp}` : "") };
    }
    return { quality: "partial", feedback: `Akceptowane, ale sprawdź: ${wordPL}`, suggestion: wordPL, source: "local" };
  }

  // ── LEVEL 2: Gemini AI evaluation ─────────────────────
  try {
    const formsPrompt = forms
      ? `\nFormy czasownika (past/pp): "${forms.past}" / "${forms.pp}"\nOdpowiedź ucznia (past/pp): "${formsAnswer?.past || ""}" / "${formsAnswer?.pp || ""}"`
      : "";

    const prompt = `Jesteś nauczycielem angielskiego oceniającym odpowiedź ucznia.

Słowo angielskie: "${wordEN}"
Poprawne tłumaczenie polskie: "${wordPL}"${formsPrompt}
Odpowiedź ucznia (tłumaczenie): "${userAnswer}"

Oceń odpowiedź ucznia. Uwzględnij:
- Różne formy gramatyczne (widzę = widzieć = OK)
- Synonimy (iść = chodzić może być OK lub częściowe)
- Literówki (1-2 znaki)
- Czy odpowiedź jest sensowna w kontekście słowa

Odpowiedz TYLKO JSON bez żadnego tekstu wokół:
{
  "quality": "full" | "partial" | "wrong",
  "feedback": "krótki komentarz po polsku max 60 znaków",
  "suggestion": "najlepsze polskie tłumaczenie"
}

quality:
- "full" = poprawne (w tym formy gramatyczne, synonimy, drobne literówki)
- "partial" = akceptowane ale nieprecyzyjne (inny synonim, inna forma)  
- "wrong" = błędne lub zupełnie inne znaczenie`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-goog-api-key": key },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 200 }
        })
      }
    );

    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || `HTTP ${res.status}`);
    }

    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
    const clean = text.replace(/```json|```/g, "").trim();
    const parsed = JSON.parse(clean);

    // Merge forms result with AI quality
    let finalQuality = parsed.quality;
    if (!formsOk && finalQuality === "full") finalQuality = "partial";
    if (!formsOk && finalQuality === "partial") finalQuality = "partial";

    return {
      quality: finalQuality,
      feedback: parsed.feedback || "",
      suggestion: parsed.suggestion || wordPL,
      source: "ai",
      formsDetail: formsDetail || undefined,
    };
  } catch (e) {
    // AI failed — fall back to local result
    console.warn("Gemini error:", e.message);
    if (localResult === "none") {
      return { quality: "wrong", feedback: `AI niedostępne. Poprawna: ${wordPL}`, suggestion: wordPL, source: "local-fallback",
        correctDisplay: wordPL + (forms ? ` · ${forms.past} · ${forms.pp}` : "") };
    }
    return { quality: localResult === "full" ? "full" : "partial", feedback: `Zaakceptowano lokalnie (AI niedostępne)`, suggestion: wordPL, source: "local-fallback" };
  }
}

// Verify Gemini key — returns { ok, error }
async function verifyGeminiKey(key) {
  try {
    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`,
      {
        method: "POST",
        headers: { "Content-Type": "application/json", "x-goog-api-key": key },
        body: JSON.stringify({ contents: [{ parts: [{ text: "Say OK" }] }], generationConfig: { maxOutputTokens: 5 } })
      }
    );
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      return { ok: false, error: err?.error?.message || `HTTP ${res.status}` };
    }
    return { ok: true };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// Fetch synonyms from Datamuse (free, no key)
// Returns [{word, score}]
async function fetchDatamuseSynonyms(word) {
  try {
    const r = await fetch(`https://api.datamuse.com/words?rel_syn=${encodeURIComponent(word)}&max=12`);
    if (!r.ok) return [];
    const data = await r.json();
    return data.map(d => d.word).filter(Boolean);
  } catch { return []; }
}

// Fetch related words (same meaning group, broader)
async function fetchDatamuseRelated(word) {
  try {
    const [syn, trg, mlt] = await Promise.all([
      fetch(`https://api.datamuse.com/words?rel_syn=${encodeURIComponent(word)}&max=8`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.datamuse.com/words?rel_trg=${encodeURIComponent(word)}&max=6`).then(r=>r.json()).catch(()=>[]),
      fetch(`https://api.datamuse.com/words?ml=${encodeURIComponent(word)}&max=6`).then(r=>r.json()).catch(()=>[]),
    ]);
    const synWords = syn.map(d=>({word:d.word, type:"synonym"}));
    const trgWords = trg.map(d=>({word:d.word, type:"related"}));
    const mltWords = mlt.map(d=>({word:d.word, type:"similar"}));
    // Deduplicate
    const seen = new Set([word]);
    return [...synWords, ...trgWords, ...mltWords].filter(x => {
      if (seen.has(x.word)) return false;
      seen.add(x.word); return true;
    }).slice(0, 16);
  } catch { return []; }
}

// Translate a list of EN words to PL using Gemini (with key)
// Returns { word: plTranslation }
async function translateWordsBatch(words, contextWord, userId) {
  const key = getGeminiKey(userId);
  if (!key || !words.length) return {};
  try {
    const prompt = `Przetłumacz poniższe angielskie słowa na polski.
Kontekst: wszystkie są związane ze słowem "${contextWord}".
Podaj TYLKO JSON: {"słowo_en": "tłumaczenie_pl", ...}
Tłumaczenia krótkie — jedno lub dwa słowa, najbliższe znaczenie.

Słowa: ${words.join(", ")}`;

    const res = await fetch(
      `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent`,
      { method:"POST", headers:{"Content-Type":"application/json", "x-goog-api-key": key},
        body: JSON.stringify({ contents:[{parts:[{text:prompt}]}], generationConfig:{temperature:0.1,maxOutputTokens:400} }) }
    );
    if (!res.ok) return {};
    const data = await res.json();
    const text = data?.candidates?.[0]?.content?.parts?.[0]?.text || "";
    return JSON.parse(text.replace(/```json|```/g,"").trim());
  } catch { return {}; }
}

// Full synonym lookup — returns [{word, pl, type}]
async function lookupSynonyms(word, userId) {
  const related = await fetchDatamuseRelated(word);
  if (!related.length) return [];
  const enWords = related.map(r => r.word);
  const translations = await translateWordsBatch(enWords, word, userId);
  return related.map(r => ({
    word: r.word,
    pl: translations[r.word] || "",
    type: r.type,
  }));
}

function App() {
  const [data, setData] = useState(initData);
  const [screen, setScreen] = useState("splash");
  const [toast, setToast] = useState(null);
  const toastTimer = useRef();

  // persist
  useEffect(() => { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }, [data]);

  // boot
  useEffect(() => {
    setTimeout(() => {
      if (data.firstRun) setScreen("onboarding");
      else if (!data.currentUserId) setScreen("login");
      else setScreen("home");
    }, 1200);
  }, []);

  const showToast = useCallback((msg, color = T.acc2) => {
    clearTimeout(toastTimer.current);
    setToast({ msg, color });
    toastTimer.current = setTimeout(() => setToast(null), 2800);
  }, []);

  const mutate = useCallback((fn) => {
    setData(d => {
      const nd = JSON.parse(JSON.stringify(d));
      fn(nd);
      return nd;
    });
  }, []);

  const currentUser = data.users.find(u => u.id === data.currentUserId) || null;

  // ── Actions ──────────────────────────────────────────────
  function completeOnboarding(profile) {
    mutate(d => {
      const user = {
        id: uid(), name: profile.name, pin: profile.pin,
        roles: profile.roles, classId: null,
        createdAt: Date.now(), xp: 0, streak: 0, lastStudyDate: null,
      };
      d.users = [user];
      d.currentUserId = user.id;
      d.firstRun = false;
    });
    setScreen("home");
    showToast("Witaj! Aplikacja gotowa 🎉");
  }

  function login(userId) {
    mutate(d => { d.currentUserId = userId; });
    setScreen("home");
  }

  function logout() {
    mutate(d => { d.currentUserId = null; });
    setScreen("login");
  }

  function addUser(profile) {
    mutate(d => {
      d.users.push({ id: uid(), name: profile.name, pin: profile.pin, roles: profile.roles, classId: null, createdAt: Date.now(), xp: 0, streak: 0, lastStudyDate: null });
    });
    showToast("Dodano użytkownika");
  }

  function updateUser(id, changes) {
    mutate(d => { const u = d.users.find(x => x.id === id); if (u) Object.assign(u, changes); });
  }

  function deleteUser(id) {
    mutate(d => { d.users = d.users.filter(u => u.id !== id); });
  }

  function addWords(newWords) {
    let added = 0;
    mutate(d => {
      if (!d.phrases) d.phrases = [];
      newWords.forEach(w => {
        const isPhraseType = w.type && ["phrasal_verb","idiom","expression","proverb"].includes(w.type);
        const arr = isPhraseType ? d.phrases : d.words;
        const exists = arr.some(x => norm(x.en) === norm(w.en) && norm(x.pl) === norm(w.pl));
        if (!exists) {
          arr.push({ ...w, id: uid(), status: w.status || (isTeacher(currentUser) ? "approved" : "pending"), source: w.source || "manual", addedBy: currentUser?.id || "admin", addedAt: Date.now() });
          added++;
        }
        if (w.category && !d.categories.includes(w.category)) d.categories.push(w.category);
      });
    });
    showToast(`Dodano ${added} słów`);
  }

  function addPhrases(newPhrases) {
    let added = 0;
    mutate(d => {
      if (!d.phrases) d.phrases = [];
      newPhrases.forEach(p => {
        const exists = d.phrases.some(x => norm(x.en) === norm(p.en));
        if (!exists) {
          d.phrases.push({ ...p, id: uid(), status: "approved", source: p.source || "manual", addedBy: currentUser?.id || "admin", addedAt: Date.now() });
          added++;
        }
      });
    });
    showToast(`Dodano ${added} zwrotów`);
  }

  function updatePhrase(id, changes) {
    mutate(d => { if (!d.phrases) d.phrases = []; const p = d.phrases.find(x => x.id === id); if (p) Object.assign(p, changes); });
  }

  function deletePhrase(id) { mutate(d => { if (d.phrases) d.phrases = d.phrases.filter(p => p.id !== id); }); }

  function updateWord(id, changes) {
    mutate(d => {
      const w = d.words.find(x => x.id === id);
      if (w) Object.assign(w, changes);
      if (changes.category && !d.categories.includes(changes.category)) d.categories.push(changes.category);
    });
  }

  function deleteWord(id) { mutate(d => { d.words = d.words.filter(w => w.id !== id); }); }

  function addCategory(cat) { if (cat && !data.categories.includes(cat)) mutate(d => { d.categories.push(cat); }); }

  function addTestScope(scope) { mutate(d => { d.testScopes.push({ ...scope, id: uid(), createdAt: Date.now(), createdBy: currentUser?.id }); }); }
  function updateTestScope(id, changes) { mutate(d => { const s = d.testScopes.find(x => x.id === id); if (s) Object.assign(s, changes); }); }
  function deleteTestScope(id) { mutate(d => { d.testScopes = d.testScopes.filter(s => s.id !== id); }); }

  function saveSession(session) {
    mutate(d => {
      d.sessions.unshift({ ...session, id: uid(), userId: currentUser?.id, date: Date.now() });
      if (d.sessions.length > 200) d.sessions = d.sessions.slice(0, 200);
      const u = d.users.find(x => x.id === currentUser?.id);
      if (u) {
        u.xp = (u.xp || 0) + session.xpEarned;
        const today = new Date().toDateString();
        if (u.lastStudyDate !== today) {
          const yesterday = new Date(Date.now() - 86400000).toDateString();
          u.streak = u.lastStudyDate === yesterday ? (u.streak || 0) + 1 : 1;
          u.lastStudyDate = today;
        }
      }
    });
  }

  function updateProgress(wordId, result) {
    mutate(d => {
      const key = `${currentUser?.id}_${wordId}`;
      const p = d.progress[key] || { score: 0, streak: 0, nextReview: 0, lastSeen: 0 };
      p.score = result.correct ? Math.max(0, p.score) + 1 : p.score - 1;
      p.streak = result.correct ? p.streak + 1 : 0;
      p.nextReview = result.correct ? Date.now() + (p.score * 8 * 3600000) : Date.now() + 1800000;
      p.lastSeen = Date.now();
      d.progress[key] = p;
    });
  }

  function getProgress(wordId) {
    return data.progress[`${currentUser?.id}_${wordId}`] || { score: 0, streak: 0, nextReview: 0, lastSeen: 0 };
  }

  function exportData() {
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a"); a.href = url; a.download = `vocablab-backup-${Date.now()}.json`; a.click();
    URL.revokeObjectURL(url);
    showToast("Eksport gotowy");
  }

  function importData(json) {
    try {
      const d = JSON.parse(json);
      if (!d.words || !d.users) throw new Error("Nieprawidłowy format");
      setData(d);
      showToast("Import zakończony");
    } catch (e) { showToast("Błąd importu: " + e.message, T.red); }
  }

  // ── Render ───────────────────────────────────────────────
  const ctx = { data, currentUser, mutate, showToast, addWords, updateWord, deleteWord, addCategory, addTestScope, updateTestScope, deleteTestScope, saveSession, updateProgress, getProgress, addUser, updateUser, deleteUser, login, logout, exportData, importData, addPhrases, updatePhrase, deletePhrase };

  return (
    <div style={{ background: T.bg, color: T.tx, minHeight: "100vh", fontFamily: "'DM Sans',sans-serif", display: "flex", flexDirection: "column", maxWidth: 480, margin: "0 auto", position: "relative" }}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
      <style>{`
        * { box-sizing: border-box; margin: 0; padding: 0; }
        input:focus { border-color: ${T.acc} !important; }
        select { appearance: none; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: ${T.b2}; border-radius: 2px; }
        @keyframes fadeUp { from { opacity:0; transform:translateY(12px);} to { opacity:1; transform:translateY(0);} }
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:.4; } }
        .fade-up { animation: fadeUp .3s ease both; }
      `}</style>

      {screen === "splash" && <SplashScreen />}
      {screen === "onboarding" && <OnboardingScreen onDone={completeOnboarding} />}
      {screen === "login" && <LoginScreen users={data.users} onLogin={login} />}
      {screen === "home" && currentUser && <AppShell screen="home" ctx={ctx} />}
      {screen === "home" && !currentUser && <LoginScreen users={data.users} onLogin={login} />}

      {toast && (
        <div style={{ position: "fixed", bottom: 24, left: "50%", transform: "translateX(-50%)", background: T.s3, border: `1px solid ${T.b2}`, borderRadius: 10, padding: "10px 18px", fontSize: 13, color: T.tx, zIndex: 9999, whiteSpace: "nowrap", boxShadow: "0 8px 32px rgba(0,0,0,.6)", animation: "fadeUp .25s ease" }}>
          {toast.msg}
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  ONBOARDING
// ════════════════════════════════════════════════════════════
function OnboardingScreen({ onDone }) {
  const [step, setStep] = useState(0);
  const [form, setForm] = useState({ name: "", pin: "", mode: null, roles: [], geminiKey: "" });
  const [keyStatus, setKeyStatus] = useState(null); // null | "checking" | "ok" | "error"

  const MODES = [
    { key: "solo", label: "Tylko dla siebie", desc: "Uczysz się sam. Masz pełną kontrolę.", icon: "🧑‍💻", roles: ["admin", "teacher", "student"] },
    { key: "teacher", label: "Nauczyciel / Rodzic", desc: "Zarządzasz bazą słów i klasą.", icon: "📖", roles: ["admin", "teacher"] },
    { key: "student", label: "Uczeń w klasie", desc: "Dołączasz do istniejącej klasy.", icon: "🎓", roles: ["student"] },
  ];

  function finish() {
    if (!form.name.trim() || !form.pin || form.pin.length < 4) return;
    // Key saved to shared slot for now; after login ProfileDrawer can re-save per-user
    if (form.geminiKey.trim()) setGeminiKey(form.geminiKey, null);
    onDone({ name: form.name.trim(), pin: form.pin, roles: form.roles });
  }

  async function checkKey() {
    if (!form.geminiKey.trim()) return;
    setKeyStatus("checking");
    const r = await verifyGeminiKey(form.geminiKey.trim());
    setKeyStatus(r.ok ? "ok" : "error");
  }

  return (
    <div style={{ flex: 1, minHeight: "100vh", ...S.col(0) }}>
      <div style={{ padding: "40px 24px 24px", textAlign: "center" }}>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 36, color: T.acc, letterSpacing: -1, marginBottom: 6 }}>VocabLab</div>
        <div style={{ fontSize: 13, color: T.tx3 }}>Pierwsze uruchomienie — krok {step + 1} / 3</div>
        <div style={{ fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", marginTop: 4 }}>v1.3</div>
        {/* Step dots */}
        <div style={{ display: "flex", gap: 6, justifyContent: "center", marginTop: 10 }}>
          {[0,1,2].map(i => (
            <div key={i} style={{ width: 8, height: 8, borderRadius: "50%", background: step >= i ? T.acc : T.b2, transition: "background .2s" }} />
          ))}
        </div>
      </div>

      <div style={{ flex: 1, padding: "0 24px 40px" }}>
        {/* Step 0 — choose mode */}
        {step === 0 && (
          <div className="fade-up" style={S.col(16)}>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22, marginBottom: 4 }}>Jak używasz aplikacji?</div>
            <div style={{ fontSize: 13, color: T.tx2, marginBottom: 8 }}>To ustawi Twoje uprawnienia. Możesz je zmienić później.</div>
            {MODES.map(m => (
              <button key={m.key} onClick={() => { setForm(f => ({ ...f, mode: m.key, roles: m.roles })); setStep(1); }}
                style={{ background: T.s1, border: `1.5px solid ${T.b2}`, borderRadius: T.r2, padding: "18px 20px", cursor: "pointer", textAlign: "left", transition: "all .15s" }}>
                <div style={{ fontSize: 28, marginBottom: 8 }}>{m.icon}</div>
                <div style={{ fontSize: 16, fontWeight: 600, color: T.tx, marginBottom: 4 }}>{m.label}</div>
                <div style={{ fontSize: 13, color: T.tx2 }}>{m.desc}</div>
                <div style={{ marginTop: 10, ...S.row() }}>
                  {m.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color)}>{ROLE_META[r].icon} {ROLE_META[r].label}</span>)}
                </div>
              </button>
            ))}
          </div>
        )}

        {/* Step 1 — profile */}
        {step === 1 && (
          <div className="fade-up" style={S.col(16)}>
            <button onClick={() => setStep(0)} style={S.btn("ghost", true)}>← Wróć</button>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22 }}>Twój profil</div>
            <div>
              <label style={S.label}>Imię lub nick</label>
              <input style={S.input()} value={form.name} onChange={e => setForm(f => ({ ...f, name: e.target.value }))} placeholder="Np. Kacper" autoFocus />
            </div>
            <div>
              <label style={S.label}>PIN (min. 4 cyfry)</label>
              <input style={S.input()} type="password" inputMode="numeric" maxLength={8} value={form.pin} onChange={e => setForm(f => ({ ...f, pin: e.target.value.replace(/\D/g, "") }))} placeholder="••••" />
              <div style={{ fontSize: 11, color: T.tx3, marginTop: 5 }}>PIN służy do logowania do aplikacji.</div>
            </div>
            <div style={S.row()}>
              <div style={{ fontSize: 12, color: T.tx3 }}>Role:</div>
              {form.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color)}>{ROLE_META[r].icon} {ROLE_META[r].label}</span>)}
            </div>
            <button onClick={() => setStep(2)} style={{ ...S.btn("primary"), width: "100%", padding: "14px", fontSize: 15 }}
              disabled={!form.name.trim() || form.pin.length < 4}>
              Dalej →
            </button>
          </div>
        )}

        {/* Step 2 — Gemini API key */}
        {step === 2 && (
          <div className="fade-up" style={S.col(16)}>
            <button onClick={() => setStep(1)} style={S.btn("ghost", true)}>← Wróć</button>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 22 }}>Klucz AI <span style={{ fontSize: 14, color: T.tx3, fontStyle: "italic" }}>(opcjonalnie)</span></div>

            {/* What it's for */}
            <div style={S.card2({ borderColor: T.acc2 })}>
              <div style={{ fontSize: 13, fontWeight: 600, color: T.acc2, marginBottom: 6 }}>Do czego służy klucz Gemini?</div>
              <div style={S.col(6)}>
                {[
                  { icon: "🧠", text: "Ocenia odpowiedzi jak nauczyciel — widzę = widzieć ✓" },
                  { icon: "🔍", text: "Tłumaczy synonimy i słowa pokrewne na polski" },
                  { icon: "📸", text: "Analizuje zdjęcia podręczników i notatek" },
                ].map(x => (
                  <div key={x.icon} style={S.row({ gap: 8, alignItems: "flex-start" })}>
                    <span style={{ fontSize: 16, flexShrink: 0 }}>{x.icon}</span>
                    <span style={{ fontSize: 13, color: T.tx2 }}>{x.text}</span>
                  </div>
                ))}
              </div>
            </div>

            {/* How to get key */}
            <div style={{ fontSize: 12, color: T.tx2, lineHeight: 1.9, background: T.s2, borderRadius: T.r, padding: "12px 14px" }}>
              Jak uzyskać klucz (bezpłatny):<br />
              1. Wejdź na <span style={{ color: T.acc, fontFamily: "'DM Mono',monospace" }}>aistudio.google.com</span><br />
              2. Kliknij <strong style={{ color: T.tx }}>Get API key → Create API key</strong><br />
              3. Skopiuj klucz zaczynający się od <span style={{ fontFamily: "'DM Mono',monospace", color: T.acc2 }}>AIzaSy…</span>
            </div>

            {/* Input */}
            <div>
              <label style={S.label}>Klucz API Gemini</label>
              <div style={S.row({ gap: 8 })}>
                <input style={{ ...S.input(), flex: 1, fontFamily: "'DM Mono',monospace", fontSize: 13 }}
                  value={form.geminiKey} onChange={e => { setForm(f => ({ ...f, geminiKey: e.target.value })); setKeyStatus(null); }}
                  placeholder="AIzaSy…" autoComplete="off" spellCheck={false} />
                {form.geminiKey.trim() && (
                  <button style={S.btn("ghost", true)} onClick={checkKey} disabled={keyStatus === "checking"}>
                    {keyStatus === "checking" ? "…" : "Sprawdź"}
                  </button>
                )}
              </div>
              {keyStatus === "ok"    && <div style={{ color: T.green, fontSize: 12, marginTop: 5 }}>✓ Klucz działa poprawnie</div>}
              {keyStatus === "error" && <div style={{ color: T.red, fontSize: 12, marginTop: 5 }}>✗ Błędny klucz — sprawdź i spróbuj ponownie</div>}
            </div>

            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
              <button onClick={finish} style={{ ...S.btn("ghost"), width: "100%", justifyContent: "center" }}>
                Pomiń, skonfiguruj później
              </button>
              <button onClick={finish} style={{ ...S.btn("primary"), width: "100%", justifyContent: "center" }}
                disabled={!!form.geminiKey.trim() && keyStatus === "error"}>
                {form.geminiKey.trim() ? "Zapisz i zacznij →" : "Zacznij bez AI →"}
              </button>
            </div>
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════════════════
function LoginScreen({ users, onLogin }) {
  const [selected, setSelected] = useState(users[0]?.id || null);
  const [pin, setPin] = useState("");
  const [error, setError] = useState("");
  const pinRef = useRef();

  function doLogin() {
    const user = users.find(u => u.id === selected);
    if (!user) return;
    if (user.pin !== pin) { setError("Błędny PIN"); setPin(""); return; }
    setError(""); onLogin(user.id);
  }

  return (
    <div style={{ flex: 1, minHeight: "100vh", display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", padding: 24 }}>
      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 36, color: T.acc, letterSpacing: -1, marginBottom: 32 }}>VocabLab</div>
      <div style={{ width: "100%", ...S.col(14) }}>
        {users.length > 1 && (
          <div>
            <label style={S.label}>Wybierz profil</label>
            <div style={S.col(8)}>
              {users.map(u => (
                <button key={u.id} onClick={() => { setSelected(u.id); setPin(""); setTimeout(() => pinRef.current?.focus(), 50); }}
                  style={{ ...S.card2(), border: `1.5px solid ${selected === u.id ? T.acc : T.b1}`, cursor: "pointer", display: "flex", alignItems: "center", gap: 12, background: selected === u.id ? `${T.acc}10` : T.s2 }}>
                  <div style={{ width: 38, height: 38, borderRadius: "50%", background: T.s3, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 18 }}>
                    {u.roles.includes("admin") ? "⚙️" : u.roles.includes("teacher") ? "📖" : "🎓"}
                  </div>
                  <div>
                    <div style={{ fontWeight: 600, fontSize: 15 }}>{u.name}</div>
                    <div style={{ ...S.row(), gap: 4, marginTop: 3 }}>
                      {u.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color, { fontSize: 10, padding: "1px 6px" })}>{ROLE_META[r].label}</span>)}
                    </div>
                  </div>
                </button>
              ))}
            </div>
          </div>
        )}
        <div>
          <label style={S.label}>PIN</label>
          <input ref={pinRef} style={S.input()} type="password" inputMode="numeric" maxLength={8} value={pin} onChange={e => setPin(e.target.value.replace(/\D/g, ""))} onKeyDown={e => e.key === "Enter" && doLogin()} placeholder="••••" autoFocus={users.length === 1} />
          {error && <div style={{ color: T.red, fontSize: 12, marginTop: 5 }}>{error}</div>}
        </div>
        <button onClick={doLogin} style={{ ...S.btn("primary"), width: "100%", padding: 13, fontSize: 15 }}>Zaloguj →</button>
      </div>
    </div>
  );
}

//  APP SHELL (main navigation)

function AppShell({ ctx }) {
  const { currentUser, logout } = ctx;
  const [tab, setTab] = useState("home");
  const [showProfile, setShowProfile] = useState(false);

  const tabs = [
    { id: "home",    icon: "🏠", label: "Start" },
    { id: "learn",   icon: "📚", label: "Nauka" },
    { id: "phrases", icon: "💬", label: "Zwroty" },
    { id: "library", icon: "🗂",  label: "Baza" },
  ];

  const hasKey = !!getGeminiKey(currentUser.id);

  return (
    <div style={{ flex: 1, display: "flex", flexDirection: "column", minHeight: "100vh" }}>
      {/* Top bar */}
      <div style={{ background: T.s1, borderBottom: `1px solid ${T.b1}`, padding: "10px 16px", display: "flex", alignItems: "center", justifyContent: "space-between", flexShrink: 0 }}>
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 19, color: T.acc, letterSpacing: -0.5 }}>VocabLab</div>
        <div style={S.row({ gap: 8 })}>
          {(isTeacher(currentUser) || isAdmin(currentUser)) && (
            <button onClick={() => setTab("manage")}
              style={{ background: tab === "manage" ? `${T.acc}15` : "none", border: `1px solid ${tab === "manage" ? T.acc : T.b2}`, borderRadius: 7, padding: "4px 10px", cursor: "pointer", fontSize: 12, color: tab === "manage" ? T.acc : T.tx3 }}>
              ⚙️
            </button>
          )}
          {/* Profile button */}
          <button onClick={() => setShowProfile(true)}
            style={{ display: "flex", alignItems: "center", gap: 7, background: T.s2, border: `1px solid ${T.b2}`, borderRadius: 20, padding: "5px 12px 5px 8px", cursor: "pointer" }}>
            <div style={{ width: 24, height: 24, borderRadius: "50%", background: hasKey ? `${T.green}30` : T.s3, border: `2px solid ${hasKey ? T.green : T.b2}`, display: "flex", alignItems: "center", justifyContent: "center", fontSize: 12 }}>
              {currentUser.roles.includes("admin") ? "⚙️" : currentUser.roles.includes("teacher") ? "📖" : "🎓"}
            </div>
            <span style={{ fontSize: 13, color: T.tx2 }}>{currentUser.name}</span>
            {!hasKey && <span style={{ fontSize: 10, color: T.acc, fontFamily: "'DM Mono',monospace" }}>AI?</span>}
          </button>

  );
}

//  PROFILE DRAWER  (key + settings for every user)
// ════════════════════════════════════════════════════════════
function ProfileDrawer({ user, onClose, onLogout }) {
  const [key, setKey]       = useState(() => getGeminiKey(user.id));
  const [show, setShow]     = useState(false);
  const [status, setStatus] = useState(null); // null | "checking" | "ok" | "error" | "cleared"
  const [errMsg, setErrMsg] = useState("");

  const saved = getGeminiKey(user.id);

  async function verify() {
    if (!key.trim()) return;
    setStatus("checking"); setErrMsg("");
    const r = await verifyGeminiKey(key.trim());
    if (r.ok) { setGeminiKey(key.trim(), user.id); setStatus("ok"); }
    else { setStatus("error"); setErrMsg(r.error); }
  }

  function save() { setGeminiKey(key.trim(), user.id); setStatus("ok"); }

  function clear() { setGeminiKey("", user.id); setKey(""); setStatus("cleared"); }

  return (
    <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.7)", zIndex: 500, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
      onClick={e => e.target === e.currentTarget && onClose()}>
      <div style={{ background: T.s1, border: `1px solid ${T.b2}`, borderRadius: `${T.r3} ${T.r3} 0 0`, padding: "24px 20px 36px", width: "100%", maxWidth: 480, animation: "fadeUp .25s ease", maxHeight: "90vh", overflowY: "auto" }}>

        {/* Header */}
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
          <div>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 20 }}>Mój profil</div>
            <div style={S.row({ gap: 4, marginTop: 4 })}>
              {user.roles.map(r => <span key={r} style={S.badge(ROLE_META[r].color, { fontSize: 10 })}>{ROLE_META[r].icon} {ROLE_META[r].label}</span>)}
            </div>
          </div>
          <button onClick={onClose} style={{ background: "none", border: "none", color: T.tx2, cursor: "pointer", fontSize: 22 }}>✕</button>
        </div>

        {/* AI Key section */}
        <div style={S.col(12)}>
          <div style={{ fontSize: 13, fontWeight: 600, color: T.tx }}>🤖 Klucz Gemini AI</div>

          {/* Status banner */}
          <div style={{ ...S.card2({ borderColor: saved ? T.green : T.acc }), background: saved ? `${T.green}08` : `${T.acc}08` }}>
            <div style={S.row({ gap: 10 })}>
              <span style={{ fontSize: 20 }}>{saved ? "✅" : "⚠️"}</span>
              <div>
                <div style={{ fontSize: 13, fontWeight: 600, color: saved ? T.green : T.acc }}>
                  {saved ? "AI aktywne" : "Brak klucza — AI wyłączone"}
                </div>
                <div style={{ fontSize: 11, color: T.tx2, marginTop: 2 }}>
                  {saved
                    ? "Ocena odpowiedzi, synonimy i skanowanie zdjęć działają."
                    : "Bez klucza aplikacja działa lokalnie — bez oceny AI i tłumaczeń synonimów."}
                </div>
              </div>
            </div>
          </div>

          {/* How to get */}
          <div style={{ fontSize: 12, color: T.tx2, lineHeight: 1.8, background: T.s2, borderRadius: T.r, padding: "10px 14px" }}>
            Uzyskaj bezpłatny klucz na{" "}
            <span style={{ color: T.acc, fontFamily: "'DM Mono',monospace" }}>aistudio.google.com</span>
            {" "}→ Get API key → Create API key
          </div>

          {/* Input */}
          <div>
            <label style={S.label}>Klucz API</label>
            <div style={S.row({ gap: 8 })}>
              <input style={{ ...S.input(), flex: 1, fontFamily: "'DM Mono',monospace", fontSize: 12, letterSpacing: show ? 0 : 1 }}
                type={show ? "text" : "password"}
                value={key}
                onChange={e => { setKey(e.target.value); setStatus(null); }}
                placeholder="AIzaSy…"
                autoComplete="off" spellCheck={false} />
              <button style={S.btn("ghost", true)} onClick={() => setShow(s => !s)}>{show ? "🙈" : "👁"}</button>
            </div>
          </div>

          {/* Verify status */}
          {status === "checking" && (
            <div style={S.row({ gap: 8, color: T.tx3, fontSize: 12 })}>
              <div style={{ width: 12, height: 12, border: `2px solid ${T.b2}`, borderTopColor: T.acc2, borderRadius: "50%", animation: "spin 1s linear infinite" }} />

            </div>
          )}
          {status === "ok"      && <div style={{ color: T.green, fontSize: 12 }}>✓ Klucz zapisany i działa</div>}
          {status === "cleared" && <div style={{ color: T.acc2, fontSize: 12 }}>Klucz usunięty</div>}
          {status === "error"   && <div style={{ color: T.red, fontSize: 12 }}>✗ {errMsg}</div>}

  );

// ════════════════════════════════════════════════════════════
//  FLASHCARD SESSION  (Anki-style self-assessment)
// ════════════════════════════════════════════════════════════
function FlashcardSession({ config, ctx, onDone, onExit }) {
  const { pool, xpMult = 1, direction = "en-pl" } = config;
  const [queue, setQueue] = useState(() => shuffle([...pool]));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [stats, setStats] = useState({ knew: 0, didnt: 0 });
  const [done, setDone] = useState(false);
  const [exitAnim, setExitAnim] = useState(null); // "knew" | "didnt"

  // Keyboard support
  useEffect(() => {
    function onKey(e) {
      if (e.key === " " || e.key === "ArrowUp") { e.preventDefault(); if (!flipped) flip(); }
      if (e.key === "ArrowRight" && flipped) respond(true);
      if (e.key === "ArrowLeft"  && flipped) respond(false);
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [flipped]);

  const current = queue[idx];
  const progress = Math.round((idx / Math.max(queue.length, 1)) * 100);

  const front = direction === "en-pl" ? current?.en : current?.pl;
  const back  = direction === "en-pl" ? current?.pl : current?.en;
  const backForms = direction === "en-pl" && current?.forms
    ? `${current.forms.past} · ${current.forms.pp}` : null;

  function flip() { if (!flipped) setFlipped(true); }

  function respond(knew) {
    setExitAnim(knew ? "knew" : "didnt");
    ctx.updateProgress(current.id, { correct: knew });
    setStats(s => ({ knew: s.knew + (knew ? 1 : 0), didnt: s.didnt + (knew ? 0 : 1) }));

    // Re-queue if didn't know
    if (!knew) {
      setQueue(q => {
        const nq = [...q];
        const ri = Math.min(idx + 2 + Math.floor(Math.random() * 3), nq.length);
        nq.splice(ri, 0, { ...current });
        return nq;
      });
    }

    setTimeout(() => {
      setExitAnim(null);
      setFlipped(false);
      if (idx + 1 >= queue.length) {
        const xpEarned = Math.round(stats.knew * 10 * xpMult);
        onDone({ mode: "flashcard", correct: stats.knew + (knew ? 1 : 0), wrong: stats.didnt + (knew ? 0 : 1), total: pool.length, xpEarned });
        setDone(true);
      } else {
        setIdx(i => i + 1);
      }
    }, 280);
  }

  if (done) return null;
  if (!current) return null;

  const dirLabel = direction === "en-pl" ? "EN → PL" : "PL → EN";

  return (
    <div style={S.col(14)}>
      {/* Header */}
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={S.col(2, { gap: 2 })}>
          <div style={{ fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1px" }}>
            Fiszki · {dirLabel} · {idx + 1}/{queue.length}
          </div>
          <div style={S.row({ gap: 8 })}>
            <span style={{ fontSize: 11, color: T.green }}>✓ {stats.knew}</span>
            <span style={{ fontSize: 11, color: T.red }}>✗ {stats.didnt}</span>
          </div>
        </div>
        <button onClick={onExit} style={S.btn("ghost", true)}>✕ Zakończ</button>
      </div>

      {/* Progress */}
      <div style={{ height: 4, background: T.s3, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg,${T.acc2},${T.acc})`, borderRadius: 2, transition: "width .4s ease" }} />
      </div>

      {/* Card */}
      <div
        onClick={!flipped ? flip : undefined}
        style={{
          ...S.card({ minHeight: 200, cursor: flipped ? "default" : "pointer", userSelect: "none",
            transform: exitAnim === "knew" ? "translateX(80px)" : exitAnim === "didnt" ? "translateX(-80px)" : "none",
            opacity: exitAnim ? 0 : 1,
            transition: exitAnim ? "all .25s ease" : "border-color .2s",
            border: `1px solid ${flipped ? T.acc2 : T.b1}`,
          }),
          display: "flex", flexDirection: "column", alignItems: "center", justifyContent: "center", textAlign: "center", gap: 12,
        }}
      >
        {/* Direction label */}
        <div style={{ fontSize: 10, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1.5px" }}>
          {flipped ? (direction === "en-pl" ? "Polski" : "Angielski") : (direction === "en-pl" ? "Angielski" : "Polski")}
        </div>

        {/* Front */}
        <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "clamp(28px,7vw,48px)", letterSpacing: -0.5, lineHeight: 1.1, color: flipped ? T.tx2 : T.tx }}>
          {front}
        </div>

        {/* Back — revealed on flip */}
        {!flipped && (
          <div style={{ fontSize: 13, color: T.tx3, marginTop: 4 }}>
            Dotknij aby odkryć →
          </div>
        )}

        {flipped && (
          <div style={{ borderTop: `1px solid ${T.b1}`, paddingTop: 14, width: "100%" }}>
            <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "clamp(24px,6vw,40px)", color: T.acc, letterSpacing: -0.5, lineHeight: 1.15 }}>
              {back}
            </div>
            {backForms && (
              <div style={{ marginTop: 8, fontFamily: "'DM Mono',monospace", fontSize: 14, color: T.tx3 }}>
                {backForms}
              </div>
            )}
          </div>
        )}
      </div>

      {/* Self-assessment buttons — only after flip */}
      {flipped ? (
        <div style={S.col(10)}>
          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12 }}>
            <button onClick={() => respond(false)}
              style={{ background: `${T.red}12`, border: `1.5px solid ${T.red}50`, borderRadius: T.r2, padding: "16px 12px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all .12s" }}>
              <span style={{ fontSize: 28 }}>😕</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: T.red }}>Nie wiedziałem</span>
              <span style={{ fontSize: 11, color: T.tx3 }}>Wróci do powtórki</span>
            </button>
            <button onClick={() => respond(true)}
              style={{ background: `${T.green}12`, border: `1.5px solid ${T.green}50`, borderRadius: T.r2, padding: "16px 12px", cursor: "pointer", display: "flex", flexDirection: "column", alignItems: "center", gap: 4, transition: "all .12s" }}>
              <span style={{ fontSize: 28 }}>😊</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: T.green }}>Wiedziałem!</span>
              <span style={{ fontSize: 11, color: T.tx3 }}>+XP · do przodu</span>
            </button>
          </div>
          {/* Synonimy — dostępne po odkryciu w każdym trybie */}
          <SynonymPanel word={current} ctx={ctx} />
        </div>
      ) : (
        <button onClick={flip} style={{ ...S.btn("primary"), width: "100%", justifyContent: "center", fontSize: 15, padding: "14px" }}>
          Odkryj odpowiedź
        </button>
      )}

      {/* Keyboard hint */}
      <div style={{ textAlign: "center", fontSize: 11, color: T.tx3 }}>
        {!flipped ? "Spacja = odkryj" : "← Nie wiedziałem  ·  Wiedziałem →"}
      </div>
    </div>
  );
}


// ════════════════════════════════════════════════════════════
//  QUIZ SESSION  (with AI evaluation)
// ════════════════════════════════════════════════════════════
function QuizSession({ config, ctx, onDone, onExit }) {
  const { mode, pool, xpMult = 1, scopeId, direction = "en-pl" } = config;
  const isChoiceMode = mode === "choice" || mode === "choice3";
  const choiceCount = mode === "choice3" ? 2 : 3; // 2 wrong + 1 correct = 3 or 4
  const [queue, setQueue] = useState(() => mode === "session" ? pool.map(w => ({ ...w, _streak: 0 })) : [...pool]);
  const [idx, setIdx] = useState(0);
  const [phase, setPhase] = useState("input"); // "input" | "evaluating" | "result"
  const [evaluation, setEvaluation] = useState(null);
  const [inputVal, setInputVal] = useState("");
  const [formsVal, setFormsVal] = useState({ past: "", pp: "" });
  const [hintLevel, setHintLevel] = useState(0);
  const [sessionStats, setSessionStats] = useState({ correct: 0, partial: 0, wrong: 0 });
  const [choices, setChoices] = useState([]);
  const [done, setDone] = useState(false);
  const inputRef = useRef();

  const current = queue[idx];
  const progress = Math.round((idx / Math.max(queue.length, 1)) * 100);
  const hasKey = !!getGeminiKey(ctx.currentUser?.id);

  // Direction helpers
  // en-pl: show EN, answer PL
  // pl-en: show PL, answer EN
  const promptText  = current ? (direction === "en-pl" ? current.en : current.pl) : "";
  const answerField = direction === "en-pl" ? current?.pl : current?.en;
  const promptLabel = direction === "en-pl" ? "Angielski → Polski" : "Polski → Angielski";
  const inputLabel  = direction === "en-pl" ? "Polskie znaczenie" : "Angielskie słowo";
  const inputPlaceholder = direction === "en-pl" ? "Wpisz polskie tłumaczenie…" : "Write in English…";

  // choice options — respect direction
  useEffect(() => {
    if (!isChoiceMode || !current) return;
    const others = shuffle(ctx.data.words.filter(w => w.id !== current.id)).slice(0, choiceCount);
    const allOpts = shuffle([current, ...others]);
    setChoices(allOpts.map(w => direction === "en-pl" ? w.pl : w.en));
  }, [idx, mode, direction]);

  // tts auto-speak
  useEffect(() => {
    if (mode === "tts" && current) {
      setTimeout(() => { const u = new SpeechSynthesisUtterance(current.en); u.lang = "en-US"; u.rate = 0.85; window.speechSynthesis?.speak(u); }, 300);
    }
  }, [idx, mode]);

  useEffect(() => { if (inputRef.current && phase === "input") inputRef.current.focus(); }, [idx, phase]);

  const hasForms = !!(current?.forms) && mode !== "tts" && !isChoiceMode && direction === "en-pl";

  // hint: show N letters of correct answer
  function getHint() {
    const target = current.pl.split("/")[0].trim();
    if (hintLevel === 0) return null;
    return target.slice(0, hintLevel) + "…";
  }

  async function check(choiceVal = null) {
    if (phase !== "input") return;
    const ans = choiceVal !== null ? choiceVal : inputVal;
    if (!ans.trim() && !choiceVal) return;

    setPhase("evaluating");

    let result;
    if (isChoiceMode) {
      const correct = normPL(ans) === normPL(answerField) ||
        (answerField || "").split("/").map(a => normPL(a.trim())).includes(normPL(ans));
      result = { quality: correct ? "full" : "wrong", feedback: correct ? "Poprawnie!" : `Błąd.`, suggestion: answerField || "", source: "local" };
    } else {
      // For pl-en: evaluate English answer (no AI grammar check needed — exact/fuzzy match)
      if (direction === "pl-en") {
        const lm = localMatch(ans, current.en);
        if (lm === "full")    result = { quality: "full",    feedback: "Idealnie!", suggestion: current.en, source: "local" };
        else if (lm === "typo") result = { quality: "partial", feedback: "Literówka — prawie!", suggestion: current.en, source: "local" };
        else                  result = { quality: "wrong",   feedback: `Poprawnie: ${current.en}`, suggestion: current.en, source: "local" };
      } else {
        result = await evaluateAnswer({
          wordEN: current.en,
          wordPL: current.pl,
          userAnswer: ans,
          forms: current.forms || null,
          formsAnswer: hasForms ? formsVal : null,
          userId: ctx.currentUser?.id,
        });
      }
    }

    setEvaluation({ ...result, userAnswer: ans, formsAnswer: hasForms ? { ...formsVal } : null });
    setPhase("result");

    const isCorrect = result.quality === "full" || result.quality === "partial";
    const isFullCorrect = result.quality === "full";

    setSessionStats(s => ({
      correct: s.correct + (isFullCorrect ? 1 : 0),
      partial: s.partial + (result.quality === "partial" ? 1 : 0),
      wrong:   s.wrong   + (result.quality === "wrong" ? 1 : 0),
    }));

    ctx.updateProgress(current.id, { correct: isCorrect });

    if (mode === "session" && !isCorrect) {
      setQueue(q => {
        const nq = [...q];
        const ri = Math.min(idx + 2 + Math.floor(Math.random() * 3), nq.length);
        nq.splice(ri, 0, { ...current, _streak: 0 });
        return nq;
      });
    }
  }

  function next() {
    if (idx + 1 >= queue.length) { finish(); return; }
    setIdx(i => i + 1);
    setPhase("input");
    setEvaluation(null);
    setInputVal("");
    setFormsVal({ past: "", pp: "" });
    setHintLevel(0);
  }

  function finish() {
    const xpEarned = Math.round((sessionStats.correct + sessionStats.partial * 0.7) * 10 * xpMult);
    onDone({ mode, correct: sessionStats.correct, partial: sessionStats.partial, wrong: sessionStats.wrong, total: queue.length, xpEarned, scopeId });
    setDone(true);
  }

  if (done) return null;
  if (!current) { finish(); return null; }

  const modeLabels = { typing: "Wpisywanie", choice: "Quiz wyboru", tts: "Ze słuchu", session: "Sesja do zaliczenia", test: "Sprawdzian", daily: "Dzienny przegląd" };

  // Feedback colors
  const qualityColor = evaluation ? (evaluation.quality === "full" ? T.green : evaluation.quality === "partial" ? T.acc : T.red) : T.b1;
  const qualityBg    = evaluation ? (evaluation.quality === "full" ? `${T.green}08` : evaluation.quality === "partial" ? `${T.acc}08` : `${T.red}08`) : T.s1;
  const qualityIcon  = evaluation ? (evaluation.quality === "full" ? "✓" : evaluation.quality === "partial" ? "≈" : "✗") : "";
  const qualityLabel = evaluation ? (evaluation.quality === "full" ? "Poprawnie!" : evaluation.quality === "partial" ? "Prawie dobrze" : "Błąd") : "";

  const hint = getHint();

  return (
    <div style={S.col(14)}>

      {/* Header */}
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={S.col(2, { gap: 2 })}>
          <div style={{ fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1px" }}>
            {modeLabels[mode]} · {idx + 1}/{queue.length}
          </div>
          <div style={S.row({ gap: 8 })}>
            <span style={{ fontSize: 11, color: T.green }}>✓ {sessionStats.correct}</span>
            <span style={{ fontSize: 11, color: T.acc }}>≈ {sessionStats.partial}</span>
            <span style={{ fontSize: 11, color: T.red }}>✗ {sessionStats.wrong}</span>
            {hasKey && <span style={{ fontSize: 10, color: T.tx3, fontFamily: "'DM Mono',monospace" }}>AI ✦</span>}
          </div>
        </div>
        <button onClick={onExit} style={S.btn("ghost", true)}>✕ Zakończ</button>
      </div>

      {/* Progress bar */}
      <div style={{ height: 4, background: T.s3, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg,${T.acc2},${T.acc})`, borderRadius: 2, transition: "width .4s ease" }} />
      </div>

      {/* Question card */}
      <div style={S.card({ textAlign: "center", background: phase === "result" ? qualityBg : T.s1, border: `1px solid ${phase === "result" ? qualityColor : T.b1}`, transition: "all .25s" })}>
        <div style={{ fontSize: 10, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1.5px", marginBottom: 10 }}>
          {mode === "tts" ? "Ze słuchu" : promptLabel}
        </div>

        {/* Prompt */}
        {mode === "tts" ? (
          <div>
            <button onClick={() => { const u = new SpeechSynthesisUtterance(current.en); u.lang = "en-US"; u.rate = 0.85; window.speechSynthesis?.speak(u); }}
              style={{ fontSize: 52, background: "none", border: "none", cursor: "pointer", display: "block", margin: "0 auto 6px" }}>🔊</button>
            <div style={{ fontSize: 11, color: T.tx3 }}>Dotknij aby posłuchać ponownie</div>
          </div>
        ) : (
          <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: "clamp(26px,6vw,44px)", letterSpacing: -0.5, lineHeight: 1.1 }}>
            {promptText}
          </div>
        )}

        {/* Hint */}
        {hint && phase === "input" && (
          <div style={{ marginTop: 8, fontFamily: "'DM Mono',monospace", fontSize: 16, color: T.acc, letterSpacing: 2 }}>
            {hint}
          </div>
        )}

        {/* ── FEEDBACK after answer ── */}
        {phase === "evaluating" && (
          <div style={{ marginTop: 16, display: "flex", alignItems: "center", justifyContent: "center", gap: 8, color: T.tx3 }}>
            <div style={{ width: 16, height: 16, border: `2px solid ${T.b2}`, borderTopColor: T.acc2, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
            <span style={{ fontSize: 13 }}>Oceniam odpowiedź…</span>
          </div>
        )}

        {phase === "result" && evaluation && (
          <div style={{ marginTop: 16 }}>
            {/* Quality badge */}
            <div style={{ display: "inline-flex", alignItems: "center", gap: 8, padding: "8px 16px", background: `${qualityColor}18`, border: `1px solid ${qualityColor}40`, borderRadius: 10, marginBottom: 10 }}>
              <span style={{ fontSize: 18, color: qualityColor }}>{qualityIcon}</span>
              <span style={{ fontSize: 14, fontWeight: 700, color: qualityColor }}>{qualityLabel}</span>
              {evaluation.source === "ai" && <span style={{ fontSize: 10, color: T.tx3, fontFamily: "'DM Mono',monospace" }}>AI</span>}
            </div>

            {/* What user wrote */}
            <div style={{ marginBottom: 8 }}>
              <div style={{ fontSize: 10, color: T.tx3, textTransform: "uppercase", letterSpacing: "1px", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>Twoja odpowiedź</div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 15, color: evaluation.quality === "wrong" ? T.red : T.tx, padding: "6px 12px", background: T.s3, borderRadius: 6, display: "inline-block" }}>
                {evaluation.userAnswer || "—"}
              </div>
            </div>

            {/* Correct answer — always shown */}
            <div style={{ marginBottom: evaluation.feedback ? 8 : 0 }}>
              <div style={{ fontSize: 10, color: T.tx3, textTransform: "uppercase", letterSpacing: "1px", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>Poprawna odpowiedź</div>
              <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 15, color: T.green, padding: "6px 12px", background: `${T.green}10`, borderRadius: 6, display: "inline-block" }}>
                {answerField}
              </div>
            </div>

            {/* Forms feedback */}
            {current.forms && (
              <div style={{ marginTop: 8 }}>
                <div style={{ fontSize: 10, color: T.tx3, textTransform: "uppercase", letterSpacing: "1px", fontFamily: "'DM Mono',monospace", marginBottom: 4 }}>Formy czasownika</div>
                <div style={{ display: "flex", gap: 8, justifyContent: "center", flexWrap: "wrap" }}>
                  {[
                    { label: "Past", correct: current.forms.past, given: evaluation.formsAnswer?.past },
                    { label: "PP",   correct: current.forms.pp,   given: evaluation.formsAnswer?.pp },
                  ].map(f => {
                    const fOk = f.given ? localMatch(f.given, f.correct) !== "none" : false;
                    return (
                      <div key={f.label} style={{ textAlign: "center" }}>
                        <div style={{ fontSize: 10, color: T.tx3, marginBottom: 2 }}>{f.label}</div>
                        {f.given && (
                          <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 12, color: fOk ? T.green : T.red, textDecoration: fOk ? "none" : "line-through", marginBottom: 1 }}>
                            {f.given}
                          </div>
                        )}
                        <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 13, color: T.green, background: `${T.green}10`, padding: "3px 8px", borderRadius: 5 }}>
                          {f.correct}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* AI feedback message */}
            {evaluation.feedback && evaluation.quality !== "full" && (
              <div style={{ marginTop: 10, fontSize: 12, color: T.tx2, fontStyle: "italic", padding: "6px 12px", background: T.s3, borderRadius: 6 }}>
                💬 {evaluation.feedback}
              </div>
            )}

            {/* Suggestion if different from correct */}
            {evaluation.suggestion && normPL(evaluation.suggestion) !== normPL(current.pl) && (
              <div style={{ marginTop: 6, fontSize: 12, color: T.acc2 }}>
                Lepsze tłumaczenie: <strong style={{ fontFamily: "'DM Mono',monospace" }}>{evaluation.suggestion}</strong>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Answer input area */}
      {phase === "input" && (
        <div style={S.card()}>
          {isChoiceMode ? (
            <div style={{ display: "grid", gridTemplateColumns: mode === "choice3" ? "1fr 1fr 1fr" : "1fr 1fr", gap: 10 }}>
              {choices.map((c, i) => (
                <button key={i} onClick={() => check(c)}
                  style={{ background: T.s2, border: `1.5px solid ${T.b2}`, borderRadius: T.r, padding: "14px 10px", cursor: "pointer", fontFamily: "'DM Mono',monospace", fontSize: mode === "choice3" ? 12 : 13, color: T.tx, transition: "all .12s", textAlign: "center", lineHeight: 1.3 }}>
                  {c}
                </button>
              ))}
            </div>
          ) : (
            <div style={S.col(10)}>
              <div>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 5 }}>
                  <label style={S.label}>{inputLabel}</label>
                  {direction === "en-pl" && (
                    <button onClick={() => setHintLevel(l => Math.min(l + 1, 4))}
                      style={{ background: "none", border: `1px solid ${T.b2}`, borderRadius: 6, padding: "2px 8px", fontSize: 11, color: T.tx3, cursor: "pointer" }}>
                      💡 Podpowiedź
                    </button>
                  )}
                </div>
                <input ref={inputRef} style={S.input()} value={inputVal}
                  onChange={e => setInputVal(e.target.value)}
                  onKeyDown={e => e.key === "Enter" && check()}
                  placeholder={hint ? `Zaczyna się od: ${hint}` : inputPlaceholder}
                  autoComplete="off" autoCorrect="off" autoCapitalize="none" spellCheck={false} />
              </div>

              {hasForms && (
                <div>
                  <label style={S.label}>Formy czasownika</label>
                  <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10 }}>
                    <div>
                      <label style={{ ...S.label, color: T.tx3 }}>Past</label>
                      <input style={S.input()} value={formsVal.past}
                        onChange={e => setFormsVal(v => ({ ...v, past: e.target.value }))}
                        onKeyDown={e => e.key === "Enter" && check()}
                        placeholder="np. went" autoComplete="off" spellCheck={false} />
                    </div>
                    <div>
                      <label style={{ ...S.label, color: T.tx3 }}>Past Participle</label>
                      <input style={S.input()} value={formsVal.pp}
                        onChange={e => setFormsVal(v => ({ ...v, pp: e.target.value }))}
                        onKeyDown={e => e.key === "Enter" && check()}
                        placeholder="np. gone" autoComplete="off" spellCheck={false} />
                    </div>
                  </div>
                </div>
              )}

              <button onClick={() => check()} style={{ ...S.btn("primary"), alignSelf: "flex-end", minWidth: 100 }}>
                Sprawdź →
              </button>
            </div>
          )}
        </div>
      )}

      {/* Navigation after result */}
      {phase === "result" && (
        <div style={S.col(8)}>
          <div style={S.row({ justifyContent: "center", gap: 10 })}>
            {mode === "test" && evaluation?.quality === "wrong" ? (
              <button onClick={finish} style={S.btn("danger")}>Zakończ test</button>
            ) : (
              <button onClick={next} style={S.btn("primary")}>
                {idx + 1 >= queue.length ? "Zakończ 🎉" : "Następne →"}
              </button>
            )}
          </div>
          {/* Synonym panel — all modes */}
          <SynonymPanel word={current} ctx={ctx} />
        </div>
      )}
    </div>
  );
}

// ════════════════════════════════════════════════════════════
//  SYNONYM PANEL  (inline in quiz + library)
// ════════════════════════════════════════════════════════════
function SynonymPanel({ word, ctx, autoOpen = false }) {
  const [open, setOpen] = useState(autoOpen);
  const [loading, setLoading] = useState(autoOpen);
  const [results, setResults] = useState([]);
  const [checked, setChecked] = useState({});
  const [added, setAdded] = useState(false);
  const [offline, setOffline] = useState(false);

  const userId = ctx.currentUser?.id;
  const hasKey = !!getGeminiKey(userId);

  useEffect(() => {
    if (autoOpen) { doLoad(); }
  }, []);

  async function doLoad() {
    setLoading(true);
    setOffline(false);
    try {
      const syns = await lookupSynonyms(word.en, userId);
      setResults(syns);
      if (!syns.length && !navigator.onLine) setOffline(true);
    } catch {
      setOffline(true);
    }
    setLoading(false);
  }

  async function load() {
    if (results.length) { setOpen(o => !o); return; }
    setOpen(true);
    await doLoad();
  }

  function toggleCheck(w) { setChecked(c => ({ ...c, [w]: !c[w] })); }

  function addSelected() {
    const toAdd = results
      .filter(r => checked[r.word])
      .map(r => ({
        en: r.word, pl: r.pl || "", category: word.category || "Synonimy",
        forms: null, language: "en-pl", status: "approved", source: "synonym",
      }));
    if (!toAdd.length) return;
    ctx.addWords(toAdd);
    setAdded(true);
    setChecked({});
    setTimeout(() => setAdded(false), 2000);
  }

  const typeColors = { synonym: T.acc2, related: T.purple, similar: T.blue };
  const typeLabels = { synonym: "synonim", related: "pokrewne", similar: "podobne" };
  const checkedCount = Object.values(checked).filter(Boolean).length;

  return (
    <div>
      <button onClick={load}
        style={{ ...S.btn("ghost", true), width: "100%", justifyContent: "center", gap: 6 }}>
        🔍 Zobacz synonimy i słowa pokrewne
      </button>

      {open && (
        <div style={{ ...S.card({ marginTop: 8 }), borderColor: T.acc2 }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 600 }}>
              Słowa pokrewne do: <span style={{ color: T.acc, fontFamily: "'DM Mono',monospace" }}>{word.en}</span>
            </div>
            <button onClick={() => setOpen(false)} style={{ background: "none", border: "none", color: T.tx3, cursor: "pointer", fontSize: 16 }}>✕</button>
          </div>

          {loading && (
            <div style={S.row({ justifyContent: "center", gap: 8, padding: "16px 0", color: T.tx3 })}>
              <div style={{ width: 14, height: 14, border: `2px solid ${T.b2}`, borderTopColor: T.acc2, borderRadius: "50%", animation: "spin 1s linear infinite" }} />
              <span style={{ fontSize: 13 }}>Szukam synonimów…</span>
            </div>
          )}

          {!loading && (results.length === 0 || offline) && (
            <div style={S.col(8, { padding: "8px 0" })}>
              {offline ? (
                <div style={{ fontSize: 13, color: T.acc3, textAlign: "center" }}>
                  📡 Brak połączenia z internetem.<br />
                  <span style={{ fontSize: 11, color: T.tx3 }}>Synonimy pobierane są online (Datamuse API).</span>
                </div>
              ) : results.length === 0 ? (
                <div style={{ fontSize: 13, color: T.tx3, textAlign: "center" }}>
                  Brak synonimów dla tego słowa.
                  {!hasKey && <div style={{ fontSize: 11, marginTop: 4 }}>Dodaj klucz Gemini dla tłumaczeń PL — kliknij swoje imię w górze ekranu.</div>}
                </div>
              ) : null}
              <button onClick={doLoad} style={{ ...S.btn("ghost", true), alignSelf: "center" }}>↺ Spróbuj ponownie</button>
            </div>
          )}

          {!loading && results.length > 0 && (
            <>
              <div style={S.col(6)}>
                {results.map(r => {
                  const alreadyInBase = ctx.data.words.some(w => norm(w.en) === norm(r.word));
                  return (
                    <label key={r.word}
                      style={{ display: "flex", alignItems: "center", gap: 10, padding: "7px 10px", background: checked[r.word] ? `${T.acc2}12` : T.s2, borderRadius: 8, cursor: alreadyInBase ? "default" : "pointer", border: `1px solid ${checked[r.word] ? T.acc2 : T.b1}`, transition: "all .1s" }}>
                      <input type="checkbox" checked={!!checked[r.word]} disabled={alreadyInBase}
                        onChange={() => !alreadyInBase && toggleCheck(r.word)}
                        style={{ accentColor: T.acc2, width: 15, height: 15, flexShrink: 0 }} />
                      <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                          <span style={{ fontFamily: "'DM Mono',monospace", fontSize: 14, fontWeight: 500 }}>{r.word}</span>
                          <span style={S.badge(typeColors[r.type] || T.tx3, { fontSize: 9 })}>{typeLabels[r.type] || r.type}</span>
                          {alreadyInBase && <span style={{ fontSize: 10, color: T.green }}>✓ w bazie</span>}
                        </div>
                        {r.pl && <div style={{ fontSize: 12, color: T.tx2, marginTop: 1 }}>{r.pl}</div>}
                      </div>
                    </label>
                  );
                })}
              </div>

              {checkedCount > 0 && (
                <button onClick={addSelected}
                  style={{ ...S.btn("primary"), width: "100%", justifyContent: "center", marginTop: 10 }}>
                  {added ? "✓ Dodano!" : `Dodaj zaznaczone do bazy (${checkedCount})`}
                </button>
              )}
              {!hasKey && (
                <div style={{ fontSize: 11, color: T.tx3, marginTop: 8, textAlign: "center" }}>
                  💡 Kliknij swoje imię w górze ekranu → dodaj klucz Gemini aby uzyskać polskie tłumaczenia
                </div>
              )}
            </>
          )}
        </div>
      )}
    </div>
  );
}

//  PHRASES TAB  (phrasal verbs, idioms, expressions)
// ════════════════════════════════════════════════════════════
function PhrasesTab({ ctx }) {
  const phrases = ctx.data.phrases || [];
  const [search, setSearch] = useState("");
  const [filterType, setFilterType] = useState("all");
  const [direction, setDirection] = useState("en-pl");
  const [editing, setEditing] = useState(null);
  const [showAdd, setShowAdd] = useState(false);
  const [flipped, setFlipped] = useState({});
  const [activeSession, setActiveSession] = useState(null);

  if (activeSession) {
    return <PhraseSession config={activeSession} ctx={ctx}
      onDone={() => setActiveSession(null)}
      onExit={() => setActiveSession(null)} />;
  }

  const filtered = phrases.filter(p => {
    const q = search.toLowerCase();
    const mq = !q || p.en.toLowerCase().includes(q) || p.pl.toLowerCase().includes(q);
    const mt = filterType === "all" || p.type === filterType;
    return mq && mt;
  });

  const canEdit = isAdmin(ctx.currentUser) || isTeacher(ctx.currentUser);

  function toggleFlip(id) { setFlipped(f => ({ ...f, [id]: !f[id] })); }

  return (
    <div style={S.col(14)}>
      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 24, letterSpacing: -0.5 }}>Zwroty</div>

      {/* Direction + Practice */}
      <div style={S.row({ gap: 8 })}>
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 6, flex: 1 }}>
          {[["en-pl","🇬🇧→🇵🇱"],["pl-en","🇵🇱→🇬🇧"]].map(([v,l]) => (
            <button key={v} onClick={() => setDirection(v)}
              style={{ background: direction===v?`${T.acc}12`:T.s2, border:`1.5px solid ${direction===v?T.acc:T.b1}`, borderRadius:T.r, padding:"8px", cursor:"pointer", fontSize:13, color:direction===v?T.acc:T.tx2 }}>
              {l}
            </button>
          ))}
        </div>
        <button onClick={() => setActiveSession({ phrases: shuffle([...filtered]).slice(0,20), direction })}
          style={{ ...S.btn("primary", true), whiteSpace:"nowrap" }} disabled={!filtered.length}>
          ▶ Ćwicz ({filtered.length})
        </button>
      </div>

      {/* Toolbar */}
      <div style={S.row({ gap: 8 })}>
        <input style={{ ...S.input(), flex: 1 }} value={search} onChange={e => setSearch(e.target.value)} placeholder="🔍  Szukaj zwrotów…" />
        <select value={filterType} onChange={e => setFilterType(e.target.value)} style={{ ...S.input(), width: "auto", cursor: "pointer" }}>
          <option value="all">Wszystkie typy</option>
          <option value="phrasal_verb">Phrasal verbs</option>
          <option value="idiom">Idiomy</option>
          <option value="expression">Wyrażenia</option>
          <option value="proverb">Przysłowia</option>
        </select>
        {canEdit && <button style={S.btn("ghost", true)} onClick={() => setShowAdd(true)}>+ Dodaj</button>}
      </div>

      <div style={{ fontSize: 12, color: T.tx3 }}>{filtered.length} zwrotów</div>

      {/* Phrase cards */}
      <div style={S.col(8)}>
        {filtered.map(p => {
          const meta = PHRASE_TYPES[p.type] || PHRASE_TYPES.expression;
          const isFlipped = flipped[p.id];
          const front = direction === "en-pl" ? p.en : p.pl;
          const back  = direction === "en-pl" ? p.pl : p.en;
          const exFront = direction === "en-pl" ? p.example    : p.example_pl;
          const exBack  = direction === "en-pl" ? p.example_pl : p.example;

          return (
            <div key={p.id} style={{ ...S.card({ cursor: "pointer", transition: "border-color .15s", borderColor: isFlipped ? T.acc2 : T.b1 }), userSelect: "none" }}
              onClick={() => toggleFlip(p.id)}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: 8 }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                    <span style={S.badge(meta.color, { fontSize: 10 })}>{meta.label}</span>
                    {!isFlipped && <span style={{ fontSize: 10, color: T.tx3 }}>Dotknij aby odkryć</span>}
                  </div>
                  <div style={{ fontFamily: "'DM Mono',monospace", fontSize: 16, fontWeight: 600, color: isFlipped ? T.tx2 : T.tx }}>{front}</div>
                  {isFlipped && (
                    <>
                      <div style={{ fontFamily: "'DM Serif Display',serif", fontSize: 18, color: T.acc, marginTop: 8 }}>{back}</div>
                      {exFront && <div style={{ fontSize: 12, color: T.tx3, marginTop: 8, fontStyle: "italic" }}>„{exFront}"</div>}
                      {exBack  && <div style={{ fontSize: 12, color: T.tx2, marginTop: 2 }}>{exBack}</div>}
                    </>
                  )}
                </div>
                {canEdit && (
                  <div style={S.col(4, { flexShrink: 0 })} onClick={e => e.stopPropagation()}>
                    <button onClick={() => setEditing({ ...p })} style={{ background: "none", border: "none", color: T.tx3, cursor: "pointer", fontSize: 14 }}>✏️</button>
                    <button onClick={() => { if (confirm("Usunąć?")) ctx.deletePhrase(p.id); }} style={{ background: "none", border: "none", color: T.tx3, cursor: "pointer", fontSize: 14 }}>🗑</button>
                  </div>
                )}
              </div>
            </div>
          );
        })}
        {filtered.length === 0 && (
          <div style={{ textAlign: "center", color: T.tx3, fontSize: 13, padding: 32 }}>
            {phrases.length === 0 ? "Brak zwrotów. Dodaj phrasal verbs, idiomy i wyrażenia." : "Brak pasujących zwrotów."}
          </div>
        )}
      </div>

      {editing && <EditPhraseModal phrase={editing} onSave={changes => { ctx.updatePhrase(editing.id, changes); setEditing(null); ctx.showToast("Zapisano"); }} onClose={() => setEditing(null)} />}
      {showAdd && <AddPhraseModal onAdd={p => { ctx.addPhrases([p]); setShowAdd(false); }} onClose={() => setShowAdd(false)} />}
    </div>
  );
}

// ── Phrase flashcard session ──────────────────────────────────
function PhraseSession({ config, ctx, onDone, onExit }) {
  const { phrases, direction } = config;
  const [queue] = useState(() => shuffle([...phrases]));
  const [idx, setIdx] = useState(0);
  const [flipped, setFlipped] = useState(false);
  const [stats, setStats] = useState({ knew: 0, didnt: 0 });

  const current = queue[idx];
  if (!current) { onDone(); return null; }

  const front = direction === "en-pl" ? current.en : current.pl;
  const back  = direction === "en-pl" ? current.pl : current.en;
  const ex    = direction === "en-pl" ? current.example : current.example_pl;
  const exTr  = direction === "en-pl" ? current.example_pl : current.example;
  const meta  = PHRASE_TYPES[current.type] || PHRASE_TYPES.expression;
  const progress = Math.round((idx / queue.length) * 100);

  function respond(knew) {
    setStats(s => ({ knew: s.knew+(knew?1:0), didnt: s.didnt+(knew?0:1) }));
    if (idx + 1 >= queue.length) onDone();
    else { setIdx(i=>i+1); setFlipped(false); }
  }

  return (
    <div style={S.col(14)}>
      <div style={S.row({ justifyContent: "space-between" })}>
        <div style={S.col(2, { gap: 2 })}>
          <div style={{ fontSize: 11, color: T.tx3, fontFamily: "'DM Mono',monospace", textTransform: "uppercase", letterSpacing: "1px" }}>Zwroty · {idx+1}/{queue.length}</div>
          <div style={S.row({ gap: 8 })}>
            <span style={{ fontSize: 11, color: T.green }}>✓ {stats.knew}</span>
            <span style={{ fontSize: 11, color: T.red }}>✗ {stats.didnt}</span>
          </div>
        </div>
        <button onClick={onExit} style={S.btn("ghost", true)}>✕</button>
      </div>

      <div style={{ height: 4, background: T.s3, borderRadius: 2, overflow: "hidden" }}>
        <div style={{ height: "100%", width: `${progress}%`, background: `linear-gradient(90deg,${T.acc2},${T.acc})`, borderRadius: 2, transition: "width .4s" }} />
      </div>

      <div onClick={() => !flipped && setFlipped(true)}
        style={{ ...S.card({ cursor: flipped?"default":"pointer", minHeight: 180, border:`1px solid ${flipped?T.acc2:T.b1}`, transition:"all .2s" }),
          display:"flex", flexDirection:"column", justifyContent:"center", alignItems:"center", textAlign:"center", gap:10, userSelect:"none" }}>
        <span style={S.badge(meta.color, { fontSize: 10 })}>{meta.label}</span>
        <div style={{ fontFamily:"'DM Mono',monospace", fontSize:"clamp(18px,4vw,28px)", fontWeight:600, color: flipped?T.tx2:T.tx }}>{front}</div>
        {!flipped && <div style={{ fontSize:12, color:T.tx3 }}>Dotknij aby odkryć</div>}
        {flipped && (
          <div style={{ borderTop:`1px solid ${T.b1}`, paddingTop:12, width:"100%" }}>
            <div style={{ fontFamily:"'DM Serif Display',serif", fontSize:"clamp(16px,4vw,24px)", color:T.acc }}>{back}</div>
            {ex   && <div style={{ fontSize:12, color:T.tx3, marginTop:10, fontStyle:"italic" }}>„{ex}"</div>}
            {exTr && <div style={{ fontSize:12, color:T.tx2, marginTop:2 }}>{exTr}</div>}
          </div>
        )}
      </div>

      {flipped ? (
        <div style={S.col(10)}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
            <button onClick={() => respond(false)} style={{ background:`${T.red}12`, border:`1.5px solid ${T.red}50`, borderRadius:T.r2, padding:"14px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:26 }}>😕</span><span style={{ fontSize:13, fontWeight:700, color:T.red }}>Nie wiedziałem</span>
            </button>
            <button onClick={() => respond(true)} style={{ background:`${T.green}12`, border:`1.5px solid ${T.green}50`, borderRadius:T.r2, padding:"14px", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:4 }}>
              <span style={{ fontSize:26 }}>😊</span><span style={{ fontSize:13, fontWeight:700, color:T.green }}>Wiedziałem!</span>
            </button>
          </div>
          <SynonymPanel word={current} ctx={ctx} />
        </div>
      ) : (
        <button onClick={() => setFlipped(true)} style={{ ...S.btn("primary"), width:"100%", justifyContent:"center", padding:"14px" }}>Odkryj →</button>
      )}
    </div>
  );
}
